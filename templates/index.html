<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STR Proyecto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <style>
      /* Basic chat styling & Layout */
      .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 200px);
        max-height: 70vh;
        min-height: 300px;
      }
      .chat-history {
        flex-grow: 1;
        overflow-y: auto;
        padding: 1rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        background-color: #f9fafb;
      }
      .chat-input-area {
        padding: 1rem 1.5rem;
        border-top: 1px solid #e5e7eb;
        background-color: #ffffff;
        flex-shrink: 0;
      }
      .input-box {
        padding: 0.6rem 1rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        flex-grow: 1;
        outline: none;
        transition: border-color 0.2s ease;
        resize: none; /* Allow resize for textarea */
        min-height: 42px; /* Ensure consistent height */
      }
      .input-box:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 1px #2563eb;
      }
      .bubble {
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        max-width: 85%;
        word-wrap: break-word;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        line-height: 1.5;
      }
      .user {
        background-color: #dbeafe;
        color: #1e3a8a;
        align-self: flex-end;
        border-bottom-right-radius: 0.25rem;
        margin-left: auto;
      }
      .bot {
        background-color: #e5e7eb;
        color: #1f2937;
        align-self: flex-start;
        border-bottom-left-radius: 0.25rem;
        margin-right: auto;
      }
      /* Buttons */
      .btn {
        padding: 0.5rem 1.1rem;
        border-radius: 0.375rem;
        font-weight: 500;
        white-space: nowrap;
        transition: background-color 0.2s ease, box-shadow 0.2s ease;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 42px; /* Match input height */
      }
      .btn:focus {
        outline: none;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
      }
      .btn-primary {
        background-color: #2563eb;
        color: white;
      }
      .btn-primary:hover:not(:disabled) {
        background-color: #1d4ed8;
      }
      .btn-primary:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
        opacity: 0.7;
      }
      .btn-secondary {
        background-color: #6b7280;
        color: white;
      }
      .btn-secondary:hover:not(:disabled) {
        background-color: #4b5563;
      }
      .btn-secondary:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
        opacity: 0.7;
      }
      audio {
        width: 100%;
        margin-top: 0.75rem;
        display: block;
        height: 40px; /* Standard height */
      }
      /* Tab styling */
      .tab {
        padding: 0.75rem 1.25rem;
        border-bottom: 3px solid transparent;
        color: #4b5563;
        font-weight: 500;
        transition: all 0.2s ease;
        text-align: center;
        cursor: pointer;
      }
      .tab:hover {
        color: #1d4ed8;
        background-color: #eff6ff;
      }
      .tab.active {
        border-color: #2563eb;
        color: #1e40af;
        font-weight: 600;
      }
      /* Hide scrollbar */
      .chat-history::-webkit-scrollbar {
        display: none;
      }
      .chat-history {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Status message */
      .status-message {
        text-align: center;
        font-size: 0.875rem;
        color: #6b7280;
        padding: 0.5rem 1rem;
        background-color: #f3f4f6;
        border-radius: 9999px;
        align-self: center;
        margin: 0.5rem auto;
      }
      /* Debug specific styles */
      #micPlayback {
        display: none;
      } /* Hide audio player initially */
      #micPlayback.active {
        display: block;
      } /* Show when active */

      /* Input field height consistency */
      #ttsInput,
      #agentInput,
      #realtimeText,
      #pdfQuestion {
        box-sizing: border-box; /* Include padding and border in height */
      }
      /* Specific textarea adjustments */
      #ttsInput,
      #agentInput {
        min-height: 42px; /* Minimum height like buttons */
        height: auto; /* Allow textarea to grow */
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-900 font-sans antialiased">
    <div
      class="max-w-4xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex flex-col gap-5"
    >
      <h1 class="text-3xl font-bold text-center text-gray-800 tracking-tight">
        📡 Proyecto STR
      </h1>

      <!-- Tabs -->
      <nav class="flex justify-center border-b border-gray-300 pb-0" id="tabs">
        <button data-tab="tts" class="tab active">Texto a Voz</button>
        <button data-tab="agent" class="tab">Agente</button>
        <button data-tab="realtime" class="tab">Conversación</button>
        <button data-tab="pdf" class="tab">Documentos</button>
        <button data-tab="debug" class="tab">Debug</button>
      </nav>

      <!-- Panels Container -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <!-- Texto a Voz -->
        <section id="panel-tts" class="panel chat-container">
          <div id="ttsFeed" class="chat-history"></div>
          <div
            class="chat-input-area flex flex-col sm:flex-row gap-3 items-start sm:items-center"
          >
            <!-- Changed alignment -->
            <textarea
              id="ttsInput"
              class="input-box"
              placeholder="Escribe texto (Shift+Enter para nueva línea)"
              rows="1"
            ></textarea>
            <div class="flex gap-2 flex-shrink-0 mt-2 sm:mt-0">
              <!-- Added margin top for small screens -->
              <button id="ttsSend" class="btn btn-primary">Enviar</button>
              <button id="ttsClear" class="btn btn-secondary">Limpiar</button>
            </div>
          </div>
        </section>

        <!-- Agente -->
        <section id="panel-agent" class="panel chat-container hidden">
          <div id="agentFeed" class="chat-history"></div>
          <div
            class="chat-input-area flex flex-col sm:flex-row gap-3 items-start sm:items-center"
          >
            <!-- Changed alignment -->
            <textarea
              id="agentInput"
              class="input-box"
              placeholder="Pregunta (Shift+Enter para nueva línea)"
              rows="1"
            ></textarea>
            <div class="flex gap-2 flex-shrink-0 mt-2 sm:mt-0">
              <!-- Added margin top for small screens -->
              <button id="agentSend" class="btn btn-primary">Enviar</button>
              <button id="agentClear" class="btn btn-secondary">Limpiar</button>
            </div>
          </div>
        </section>

        <!-- Conversación -->
        <section id="panel-realtime" class="panel chat-container hidden">
          <div id="realtimeFeed" class="chat-history">
            <p id="realtimeStatus" class="status-message">Initializing...</p>
          </div>
          <div class="chat-input-area flex flex-col gap-4">
            <div class="flex flex-wrap gap-3 justify-center">
              <button id="startTalking" class="btn btn-primary">
                🎙️ Start Mic
              </button>
              <button id="stopTalking" class="btn btn-secondary" disabled>
                ⏹️ Stop Mic
              </button>
              <button id="rtClear" class="btn btn-secondary">Limpiar</button>
            </div>
            <div class="flex gap-3 items-center">
              <input
                type="text"
                id="realtimeText"
                class="input-box"
                placeholder="Enviar texto al aire (Enter para enviar)"
              />
              <button
                id="realtimeTextSend"
                class="btn btn-primary flex-shrink-0"
              >
                Enviar
              </button>
            </div>
          </div>
        </section>

        <!-- Documentos -->
        <section id="panel-pdf" class="panel chat-container hidden">
          <div id="pdfFeed" class="chat-history">
            <p id="pdfUploadStatus" class="status-message">
              Elige un PDF para cargar…
            </p>
          </div>
          <div class="chat-input-area flex flex-col gap-3">
            <input
              type="file"
              id="pdfFile"
              accept="application/pdf"
              class="block w-full text-sm text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer border border-gray-300 rounded-lg p-1"
            />
            <div
              id="pdfQA"
              class="hidden flex flex-col sm:flex-row gap-3 mt-2 items-center"
            >
              <input type="text" <!-- Changed from textarea to input -- />
              id="pdfQuestion" class="input-box flex-grow" placeholder="Pregunta
              sobre tu PDF (Enter para enviar)" />
              <div class="flex gap-2 flex-shrink-0">
                <button id="pdfAsk" class="btn btn-primary">Preguntar</button>
                <button id="pdfClear" class="btn btn-secondary">Limpiar</button>
              </div>
            </div>
          </div>
        </section>

        <!-- Debug -->
        <section id="panel-debug" class="panel chat-container hidden">
          <div id="debugFeed" class="chat-history">
            <p id="debugStatus" class="status-message">
              Herramientas de depuración
            </p>
          </div>
          <div class="chat-input-area flex flex-col gap-4">
            <!-- Play Tone -->
            <div class="flex flex-wrap gap-2 items-center">
              <span class="font-medium w-20 text-right">Tono:</span>
              <input
                type="number"
                id="toneFreq"
                class="input-box w-24 flex-shrink-0"
                placeholder="Hz"
                value="440"
              />
              <input
                type="number"
                id="toneDur"
                class="input-box w-24 flex-shrink-0"
                placeholder="ms"
                value="500"
              />
              <button id="tonePlay" class="btn btn-primary flex-shrink-0">
                Reproducir Tono
              </button>
            </div>
            <!-- LED -->
            <div class="flex flex-wrap gap-2 items-center">
              <span class="font-medium w-20 text-right">LED:</span>
              <button id="ledTest" class="btn btn-secondary flex-shrink-0">
                Test LED
              </button>
            </div>
            <!-- Button State -->
            <div class="flex flex-wrap gap-2 items-center">
              <span class="font-medium w-20 text-right">Botón:</span>
              <button id="btnState" class="btn btn-secondary flex-shrink-0">
                Leer Botón
              </button>
              <span id="btnResult" class="font-medium text-gray-700"></span>
            </div>
            <!-- Mic Record -->
            <div class="flex flex-wrap gap-2 items-center">
              <span class="font-medium w-20 text-right">Mic:</span>
              <button id="micStart" class="btn btn-primary flex-shrink-0">
                ⏺️ Start Rec
              </button>
              <button
                id="micStop"
                class="btn btn-secondary flex-shrink-0"
                disabled
              >
                ⏹️ Stop Rec
              </button>
            </div>
            <!-- Mic Playback -->
            <div class="flex flex-wrap gap-2 items-center">
              <span class="font-medium w-20 text-right">Audio:</span>
              <div class="flex-grow">
                <!-- Container for player -->
                <audio id="micPlayback" controls class="w-full"></audio>
                <span
                  id="micPlaybackStatus"
                  class="text-sm text-gray-500 italic"
                ></span>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script>
      const socket = io("/realtime", { transports: ["websocket"] });
      const el = (sel) => document.querySelector(sel);
      const elAll = (sel) => document.querySelectorAll(sel);

      function showToast(message, type = "info") {
        console.log(`TOAST (${type}): ${message}`);
        const toastContainer = el("#toast-container") || createToastContainer();
        const toast = document.createElement("div");
        toast.textContent = message;
        toast.className = `p-3 rounded-lg shadow-md text-white text-sm mb-2 transform transition-all duration-300 ease-out ${
          type === "error"
            ? "bg-red-600"
            : type === "success"
            ? "bg-green-600"
            : "bg-blue-600"
        }`;
        toast.style.opacity = "0"; // Start transparent
        toast.style.transform = "translateY(20px)"; // Start lower

        toastContainer.insertBefore(toast, toastContainer.firstChild); // Add new toasts at the top

        // Animate in
        requestAnimationFrame(() => {
          toast.style.opacity = "1";
          toast.style.transform = "translateY(0)";
        });

        // Auto-remove
        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transform = "translateY(-20px)"; // Animate out upwards
          toast.addEventListener("transitionend", () => toast.remove());
        }, 3500);
      }
      function createToastContainer() {
        const container = document.createElement("div");
        container.id = "toast-container";
        container.className = "fixed bottom-5 right-5 z-50 w-64"; // Position & size
        document.body.appendChild(container);
        return container;
      }

      const feedClear = (feedSel, statusSel = null, initialMsg = "") => {
        const feed = el(feedSel);
        if (!feed) return;
        feed.innerHTML = "";
        if (statusSel) {
          const statusElement = el(statusSel);
          if (statusElement) {
            // Check if the status element is *supposed* to be inside the feed
            const isChild = statusElement.closest(feedSel);
            if (isChild) {
              // Recreate it if it's meant to be inside
              const p = document.createElement("p");
              p.id = statusElement.id; // Keep the original ID
              p.className = "status-message";
              p.textContent = initialMsg;
              feed.appendChild(p);
            } else {
              // Update it if it's outside the feed
              statusElement.textContent = initialMsg;
            }
          }
        }
      };

      function appendBubble(feedSel, text, who, audioUrl = null) {
        const feed = el(feedSel);
        if (!feed) return;
        // Remove initial status message if present
        const statusMsg = feed.querySelector(".status-message");
        if (statusMsg) statusMsg.remove();

        const bubbleDiv = document.createElement("div");
        bubbleDiv.className = `bubble ${who} flex flex-col`; // Flex column for text + audio
        const textNode = document.createElement("p");
        textNode.textContent = text;
        bubbleDiv.appendChild(textNode);

        if (audioUrl) {
          try {
            const audio = document.createElement("audio");
            audio.controls = true;
            audio.preload = "metadata"; // Don't load full audio until played
            audio.src = audioUrl;
            audio.className = "mt-2 w-full"; // Style the audio player
            bubbleDiv.appendChild(audio);
          } catch (e) {
            console.error("Error creating audio element:", e);
            const errorP = document.createElement("p");
            errorP.className = "text-red-500 text-xs mt-1";
            errorP.textContent = "Could not load audio player.";
            bubbleDiv.appendChild(errorP);
          }
        }
        feed.appendChild(bubbleDiv);
        // Scroll to bottom smoothly after the element is added
        requestAnimationFrame(() => {
          feed.scrollTo({ top: feed.scrollHeight, behavior: "smooth" });
        });
      }

      async function apiCall(endpoint, method = "POST", body = null) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000); // 15 second timeout

        try {
          const options = {
            method,
            headers: {},
            signal: controller.signal, // Add abort signal
          };
          if (body) {
            if (body instanceof FormData) {
              // Let browser set Content-Type for FormData
              options.body = body;
            } else {
              options.headers["Content-Type"] = "application/json";
              options.body = JSON.stringify(body);
            }
          }
          const response = await fetch(endpoint, options);
          clearTimeout(timeoutId); // Clear timeout if fetch succeeds

          let data;
          const contentType = response.headers.get("content-type");
          if (contentType && contentType.includes("application/json")) {
            data = await response.json();
          } else {
            // Handle non-JSON responses (e.g., plain text errors)
            const text = await response.text();
            // Synthesize a JSON-like structure for consistency
            data = {
              success: response.ok,
              status_text: text || response.statusText,
            };
            if (!response.ok) {
              data.error = data.status_text; // Assign text as error message
            }
          }
          // Ensure 'success' property reflects HTTP status
          if (data.success === undefined) data.success = response.ok;
          // Standardize error message reporting
          if (!response.ok && !data.error) {
            data.error =
              data.message ||
              data.status_text ||
              `HTTP Error ${response.status}`;
          }
          return data;
        } catch (err) {
          clearTimeout(timeoutId); // Clear timeout on error too
          console.error(`API call to ${endpoint} failed:`, err);
          // Handle specific AbortError for timeouts
          if (err.name === "AbortError") {
            return {
              success: false,
              error: "Request timed out after 15 seconds.",
            };
          }
          return {
            success: false,
            error: err.message || "Network or script error",
          };
        }
      }

      /* Tabs */
      const tabs = elAll("#tabs .tab");
      const panels = elAll(".panel");
      tabs.forEach((tab) => {
        tab.onclick = () => {
          tabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          const targetPanelId = `panel-${tab.dataset.tab}`;
          panels.forEach((p) => {
            p.classList.toggle("hidden", p.id !== targetPanelId);
          });
        };
      });

      /* ====================================================== */
      /*                Input Handling & Submission             */
      /* ====================================================== */

      function setupEnterKeySubmission(inputId, buttonId, isTextarea = false) {
        const inputElement = el(inputId);
        const buttonElement = el(buttonId);
        if (!inputElement || !buttonElement) {
          console.warn(`Setup failed: Cannot find ${inputId} or ${buttonId}`);
          return;
        }

        inputElement.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            if (isTextarea) {
              // For textareas, only submit if Shift is NOT pressed
              if (!event.shiftKey) {
                event.preventDefault(); // Prevent newline
                buttonElement.click(); // Trigger button click
              }
              // If Shift is pressed, allow default newline behavior
            } else {
              // For regular inputs, always submit on Enter
              event.preventDefault(); // Prevent potential form submission if wrapped
              buttonElement.click(); // Trigger button click
            }
          }
        });

        // Auto-resize textarea height
        if (isTextarea) {
          inputElement.addEventListener("input", () => {
            inputElement.style.height = "auto"; // Reset height
            inputElement.style.height = `${inputElement.scrollHeight}px`; // Set to scroll height
          });
        }
      }

      // --- Setup Enter Key for all relevant inputs ---
      setupEnterKeySubmission("#ttsInput", "#ttsSend", true); // Textarea
      setupEnterKeySubmission("#agentInput", "#agentSend", true); // Textarea
      setupEnterKeySubmission("#realtimeText", "#realtimeTextSend", false); // Input
      setupEnterKeySubmission("#pdfQuestion", "#pdfAsk", false); // Input

      /* ====================================================== */
      /*                      Tab Logic                         */
      /* ====================================================== */

      /* TTS */
      const ttsInput = el("#ttsInput"),
        ttsSendBtn = el("#ttsSend"),
        ttsFeed = "#ttsFeed";
      ttsSendBtn.onclick = async () => {
        const txt = ttsInput.value.trim();
        if (!txt) return;
        appendBubble(ttsFeed, txt, "user");
        ttsInput.value = "";
        ttsInput.style.height = "auto"; // Reset height after sending
        ttsInput.focus();
        ttsSendBtn.disabled = true;
        const res = await apiCall("/api/tts", "POST", { text: txt });
        if (res.success && res.message) {
          appendBubble(ttsFeed, res.message, "bot", res.audio_url);
        } else {
          appendBubble(
            ttsFeed,
            `Error: ${res.error || "Unknown TTS error"}`,
            "bot"
          );
          showToast(`TTS Error: ${res.error || "Unknown"}`, "error");
        }
        ttsSendBtn.disabled = false;
      };
      el("#ttsClear").onclick = () => feedClear(ttsFeed);

      /* Agent */
      const agentInput = el("#agentInput"),
        agentSendBtn = el("#agentSend"),
        agentFeed = "#agentFeed";
      agentSendBtn.onclick = async () => {
        const q = agentInput.value.trim();
        if (!q) return;
        appendBubble(agentFeed, q, "user");
        agentInput.value = "";
        agentInput.style.height = "auto"; // Reset height after sending
        agentInput.focus();
        agentSendBtn.disabled = true;
        const res = await apiCall("/api/agent", "POST", { query: q });
        if (res.success && res.message) {
          appendBubble(agentFeed, res.message, "bot", res.audio_url);
        } else {
          appendBubble(
            agentFeed,
            `Error: ${res.error || "Unknown agent error"}`,
            "bot"
          );
          showToast(`Agent Error: ${res.error || "Unknown"}`, "error");
        }
        agentSendBtn.disabled = false;
      };
      el("#agentClear").onclick = () => feedClear(agentFeed);

      /* Realtime */
      const startBtn = el("#startTalking"),
        stopBtn = el("#stopTalking"),
        rtStatus = el("#realtimeStatus"),
        realtimeFeed = "#realtimeFeed",
        rtText = el("#realtimeText"),
        rtTextSend = el("#realtimeTextSend");
      startBtn.onclick = () => socket.emit("start_talking");
      stopBtn.onclick = () => socket.emit("stop_talking");
      el("#rtClear").onclick = () =>
        feedClear(realtimeFeed, "#realtimeStatus", "Ready");
      rtTextSend.onclick = () => {
        const m = rtText.value.trim();
        if (!m) return;
        appendBubble(realtimeFeed, m, "user");
        rtText.value = "";
        rtText.focus();
        socket.emit("send_text", { text: m });
      };
      // Socket.IO listeners for realtime
      socket.on("status", (d) => {
        rtStatus.textContent = d.message;
        if (d.message === "Recording…") {
          startBtn.disabled = true;
          stopBtn.disabled = false;
          rtTextSend.disabled = true; // Disable text send while mic is active? Optional.
        } else if (d.message === "Ready" || d.message.startsWith("Error:")) {
          startBtn.disabled = false;
          stopBtn.disabled = true;
          rtTextSend.disabled = false;
        } else {
          // Processing... state
          startBtn.disabled = true;
          stopBtn.disabled = true;
          rtTextSend.disabled = false; // Allow sending text while processing
        }
        // Handle specific error case
        if (d.message.includes("Realtime Error: Service unavailable")) {
          startBtn.disabled = true;
          stopBtn.disabled = true;
          rtTextSend.disabled = true;
        }
      });
      socket.on("broadcast_text", (d) => {
        appendBubble(realtimeFeed, d.message, "bot");
        rtStatus.textContent = "Ready"; // Set status back to ready after broadcast
        startBtn.disabled = false;
        stopBtn.disabled = true;
        rtTextSend.disabled = false;
      });
      socket.on("connect", () => {
        console.log("Realtime WebSocket connected.");
        rtStatus.textContent = "Connected. Ready.";
        startBtn.disabled = false;
        stopBtn.disabled = true;
        rtTextSend.disabled = false;
      });
      socket.on("disconnect", (reason) => {
        console.log(`Realtime WebSocket disconnected: ${reason}`);
        rtStatus.textContent = "Disconnected. Check server.";
        startBtn.disabled = true;
        stopBtn.disabled = true;
        rtTextSend.disabled = true;
        showToast("Realtime connection lost.", "error");
      });
      socket.on("connect_error", (err) => {
        console.error(`Realtime connection error: ${err.message}`);
        rtStatus.textContent = `Connection Error: ${err.message}`;
        startBtn.disabled = true;
        stopBtn.disabled = true;
        rtTextSend.disabled = true;
        showToast(`Realtime connection error: ${err.message}`, "error");
      });

      /* PDF */
      let currentPDF = null;
      const pdfFile = el("#pdfFile"),
        pdfAskBtn = el("#pdfAsk"),
        pdfQuestion = el("#pdfQuestion"),
        pdfClearBtn = el("#pdfClear"),
        pdfFeed = "#pdfFeed",
        pdfStatus = el("#pdfUploadStatus"),
        pdfQA = el("#pdfQA");
      pdfFile.onchange = async () => {
        const file = pdfFile.files[0];
        if (!file) return;
        pdfStatus.textContent = "⏳ Subiendo e indexando PDF…";
        pdfQA.classList.add("hidden");
        pdfAskBtn.disabled = true;
        pdfFile.disabled = true; // Disable input while uploading
        currentPDF = null;
        const fd = new FormData();
        fd.append("file", file);
        const res = await apiCall("/api/pdf/upload", "POST", fd);
        if (res.success && res.filename) {
          currentPDF = res.filename;
          const txt = `✅ PDF listo: ${currentPDF}`;
          pdfStatus.textContent = txt;
          pdfQA.classList.remove("hidden");
          pdfAskBtn.disabled = false;
          pdfQuestion.value = ""; // Clear question field
          pdfQuestion.focus();
          feedClear(pdfFeed, "#pdfUploadStatus", txt); // Clear chat, keep status
          showToast(`PDF "${currentPDF}" cargado`, "success");
        } else {
          pdfStatus.textContent = `⚠️ Error al cargar PDF: ${
            res.error || "Unknown"
          }`;
          pdfFile.value = ""; // Clear file input
          showToast(`Error cargando PDF: ${res.error || "Unknown"}`, "error");
        }
        pdfFile.disabled = false; // Re-enable input
      };
      pdfAskBtn.onclick = async () => {
        const q = pdfQuestion.value.trim();
        if (!q || !currentPDF) {
          showToast(
            "Escribe una pregunta y asegúrate que el PDF esté cargado.",
            "warning"
          );
          return;
        }
        appendBubble(pdfFeed, q, "user");
        pdfQuestion.value = "";
        pdfQuestion.focus();
        pdfAskBtn.disabled = true;
        const res = await apiCall("/api/pdf/ask", "POST", {
          question: q,
          filename: currentPDF,
        });
        if (res.success && res.answer) {
          appendBubble(pdfFeed, res.answer, "bot", res.audio_url);
        } else {
          appendBubble(
            pdfFeed,
            `Error: ${res.error || "Unknown PDF query error"}`,
            "bot"
          );
          showToast(
            `Error en consulta PDF: ${res.error || "Unknown"}`,
            "error"
          );
        }
        pdfAskBtn.disabled = false;
      };
      pdfClearBtn.onclick = () => {
        const txt = currentPDF
          ? `✅ PDF listo: ${currentPDF}`
          : "Elige un PDF para cargar…";
        feedClear(pdfFeed, "#pdfUploadStatus", txt);
      };

      /* Debug Controls */
      const debugStatus = el("#debugStatus");

      // Tone
      el("#tonePlay").onclick = async () => {
        const f = +el("#toneFreq").value || 440;
        const d = +el("#toneDur").value || 500;
        debugStatus.textContent = "Generando y reproduciendo tono...";
        const res = await apiCall(
          `/api/debug/tone?frequency=${f}&duration=${d}`,
          "POST"
        );
        if (res.success) {
          showToast(`Tono ${f}Hz reproducido`, "success");
          debugStatus.textContent = `Tono ${f}Hz reproducido.`;
        } else {
          showToast(`Error con el tono: ${res.error}`, "error");
          debugStatus.textContent = `Error con el tono: ${res.error}`;
        }
      };

      // LED
      el("#ledTest").onclick = async () => {
        debugStatus.textContent = "Probando LED...";
        const res = await apiCall("/api/debug/led", "POST");
        if (res.success) {
          showToast("Secuencia LED iniciada", "success");
          debugStatus.textContent = "Secuencia LED iniciada.";
        } else {
          showToast(`Error de LED: ${res.error}`, "error");
          debugStatus.textContent = `Error de LED: ${res.error}`;
        }
      };

      // Button State
      el("#btnState").onclick = async () => {
        debugStatus.textContent = "Leyendo botón...";
        const res = await apiCall("/api/debug/button", "GET");
        const btnResultSpan = el("#btnResult");
        if (res.success && res.pressed !== undefined) {
          btnResultSpan.textContent = res.pressed ? "Presionado" : "Suelto";
          debugStatus.textContent = `Estado botón: ${btnResultSpan.textContent}.`;
        } else {
          btnResultSpan.textContent = "Error";
          showToast(`Error leyendo botón: ${res.error}`, "error");
          debugStatus.textContent = `Error leyendo botón: ${res.error}`;
        }
      };

      // Mic Record Start/Stop
      const micStartBtn = el("#micStart");
      const micStopBtn = el("#micStop");
      const micAudio = el("#micPlayback");
      const micPlaybackStatus = el("#micPlaybackStatus");

      micStartBtn.onclick = async () => {
        debugStatus.textContent = "Iniciando grabación...";
        micPlaybackStatus.textContent = "";
        micAudio.style.display = "none"; // Hide player
        micAudio.src = ""; // Clear previous src

        micStartBtn.disabled = true;
        const res = await apiCall("/api/debug/mic/start", "POST");
        if (res.success) {
          micStopBtn.disabled = false; // Enable stop button ONLY on success
          showToast("Grabación iniciada", "info");
          debugStatus.textContent = "⏺️ Grabando...";
        } else {
          micStartBtn.disabled = false; // Re-enable start on error
          showToast(`Error al iniciar grabación: ${res.error}`, "error");
          debugStatus.textContent = `Error al iniciar: ${res.error}`;
        }
      };

      micStopBtn.onclick = async () => {
        debugStatus.textContent = "Deteniendo grabación...";
        micStopBtn.disabled = true; // Disable stop while processing
        const res = await apiCall("/api/debug/mic/stop", "POST");
        if (res.success && res.audio_url) {
          micAudio.src = res.audio_url;
          micAudio.style.display = "block"; // Show player
          micPlaybackStatus.textContent = `Grabación guardada: ${res.audio_url
            .split("/")
            .pop()}`;
          showToast("Grabación detenida y guardada", "success");
          debugStatus.textContent =
            "Grabación detenida. Lista para reproducir.";
          // Optional: Auto-play -> micAudio.play();
        } else {
          micPlaybackStatus.textContent = `Error: ${
            res.error || "No se pudo guardar"
          }`;
          showToast(
            `Error al detener/guardar: ${res.error || "Unknown"}`,
            "error"
          );
          debugStatus.textContent = `Error al detener: ${
            res.error || "Unknown"
          }`;
        }
        // Always re-enable start button after stop attempt
        micStartBtn.disabled = false;
      };

      // Clear Debug Feed (Optional)
      // You could add a clear button for the debug status messages if needed.
      // el("#debugClear").onclick = () => {
      //     debugStatus.textContent = "Herramientas de depuración";
      //     el("#btnResult").textContent = "";
      //     micPlaybackStatus.textContent = "";
      //     micAudio.style.display = 'none';
      //     micAudio.src = '';
      // };
    </script>
  </body>
</html>
