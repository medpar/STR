<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>STR Proyecto</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f7f7f7;
      }
      .container {
        max-width: 800px;
        margin: 20px auto;
      }
      .tab {
        overflow: hidden;
        background-color: #333;
      }
      .tab button {
        background-color: inherit;
        border: none;
        outline: none;
        cursor: pointer;
        padding: 14px 16px;
        transition: 0.3s;
        font-size: 17px;
        color: white;
      }
      .tab button:hover {
        background-color: #575757;
      }
      .tab button.active {
        background-color: #575757;
      }
      .tabcontent {
        display: none;
        padding: 20px;
        background-color: #fff;
      }
      textarea {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        resize: vertical;
        min-height: 100px;
      }
      button.submit-btn {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 4px;
        background-color: #007bff;
        color: white;
        cursor: pointer;
      }
      button.submit-btn:hover {
        background-color: #0056b3;
      }
      .result {
        margin-top: 20px;
        padding: 10px;
        border-top: 1px solid #ccc;
      }
      audio {
        width: 100%;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="tab">
        <button
          class="tablinks"
          onclick="openTab(event, 'TTS')"
          id="defaultTab"
        >
          Text-to-Speech
        </button>
        <button class="tablinks" onclick="openTab(event, 'Agent')">
          Agent Query
        </button>
      </div>

      <div id="TTS" class="tabcontent">
        <h2>Text-to-Speech</h2>
        <textarea
          id="ttsInput"
          placeholder="Enter text to convert to speech..."
        ></textarea>
        <br />
        <button class="submit-btn" onclick="sendTTSRequest()">Submit</button>
        <div id="ttsResult"></div>
      </div>

      <div id="Agent" class="tabcontent">
        <h2>Agent Query</h2>
        <textarea id="agentInput" placeholder="Enter your query..."></textarea>
        <br />
        <button class="submit-btn" onclick="sendAgentRequest()">Submit</button>
        <div id="agentResult"></div>
      </div>
    </div>

    <script>
      function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) {
          tabcontent[i].style.display = "none";
        }
        tablinks = document.getElementsByClassName("tablinks");
        for (i = 0; i < tablinks.length; i++) {
          tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
      }
      // Set default tab
      document.getElementById("defaultTab").click();

      async function sendTTSRequest() {
        const text = document.getElementById("ttsInput").value.trim();
        if (!text) {
          alert("Please enter text for TTS.");
          return;
        }
        try {
          const response = await fetch("/api/tts", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: text }),
          });
          const result = await response.json();
          if (response.ok) {
            let resultDiv = document.getElementById("ttsResult");
            let html = `<p>${result.message}</p>`;
            html += `<audio controls src="${result.audio_url}"></audio>`;
            resultDiv.innerHTML = html;
            document.getElementById("ttsInput").value = "";
          } else {
            alert("Error: " + result.error);
          }
        } catch (err) {
          alert("Error connecting to server: " + err);
        }
      }

      async function sendAgentRequest() {
        const query = document.getElementById("agentInput").value.trim();
        if (!query) {
          alert("Please enter a query.");
          return;
        }
        try {
          const response = await fetch("/api/agent", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: query }),
          });
          const result = await response.json();
          if (response.ok) {
            let resultDiv = document.getElementById("agentResult");
            let html = `<p>${result.message}</p>`;
            html += `<audio controls src="${result.audio_url}"></audio>`;
            resultDiv.innerHTML = html;
            document.getElementById("agentInput").value = "";
          } else {
            alert("Error: " + result.error);
          }
        } catch (err) {
          alert("Error connecting to server: " + err);
        }
      }
    </script>
  </body>
</html>
