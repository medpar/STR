<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STR Proyecto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <style>
      /* Basic chat styling & Layout */
      .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 200px);
        max-height: 70vh;
        min-height: 300px;
      }
      .chat-history {
        flex-grow: 1;
        overflow-y: auto;
        padding: 1rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        background-color: #f9fafb;
      }
      .chat-input-area {
        padding: 1rem 1.5rem;
        border-top: 1px solid #e5e7eb;
        background-color: #ffffff;
        flex-shrink: 0;
      }
      .input-box {
        padding: 0.6rem 1rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        flex-grow: 1;
        outline: none;
        transition: border-color 0.2s ease;
        resize: none; /* Allow resize for textarea */
        min-height: 42px; /* Ensure consistent height */
      }
      .input-box:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 1px #2563eb;
      }
      .bubble {
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        max-width: 85%;
        word-wrap: break-word;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        line-height: 1.5;
      }
      .user {
        background-color: #dbeafe;
        color: #1e3a8a;
        align-self: flex-end;
        border-bottom-right-radius: 0.25rem;
        margin-left: auto;
      }
      .bot {
        background-color: #e5e7eb;
        color: #1f2937;
        align-self: flex-start;
        border-bottom-left-radius: 0.25rem;
        margin-right: auto;
      }
      /* Buttons */
      .btn {
        padding: 0.5rem 1.1rem;
        border-radius: 0.375rem;
        font-weight: 500;
        white-space: nowrap;
        transition: background-color 0.2s ease, box-shadow 0.2s ease;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 42px; /* Match input height */
      }
      .btn:focus {
        outline: none;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
      }
      .btn-primary {
        background-color: #2563eb;
        color: white;
      }
      .btn-primary:hover:not(:disabled) {
        background-color: #1d4ed8;
      }
      .btn-primary:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
        opacity: 0.7;
      }
      .btn-secondary {
        background-color: #6b7280;
        color: white;
      }
      .btn-secondary:hover:not(:disabled) {
        background-color: #4b5563;
      }
      .btn-secondary:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
        opacity: 0.7;
      }
      audio {
        width: 100%;
        margin-top: 0.75rem;
        display: block;
        height: 40px; /* Standard height */
      }
      /* Tab styling */
      .tab {
        padding: 0.75rem 1.25rem;
        border-bottom: 3px solid transparent;
        color: #4b5563;
        font-weight: 500;
        transition: all 0.2s ease;
        text-align: center;
        cursor: pointer;
      }
      .tab:hover {
        color: #1d4ed8;
        background-color: #eff6ff;
      }
      .tab.active {
        border-color: #2563eb;
        color: #1e40af;
        font-weight: 600;
      }
      /* Hide scrollbar */
      .chat-history::-webkit-scrollbar {
        display: none;
      }
      .chat-history {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Status message */
      .status-message {
        text-align: center;
        font-size: 0.875rem;
        color: #6b7280;
        padding: 0.5rem 1rem;
        background-color: #f3f4f6;
        border-radius: 9999px;
        align-self: center;
        margin: 0.5rem auto;
      }
      /* Debug specific styles */
      #micPlayback {
        display: none;
      } /* Hide audio player initially */
      #micPlayback.active {
        display: block;
      } /* Show when active */

      /* Input field height consistency */
      #ttsInput,
      #agentInput,
      #realtimeText,
      #pdfQuestion {
        box-sizing: border-box; /* Include padding and border in height */
      }
      /* Specific textarea adjustments */
      #ttsInput,
      #agentInput {
        min-height: 42px; /* Minimum height like buttons */
        height: auto; /* Allow textarea to grow */
      }
      /* Styling for realtime text display */
      .bot .bot-text {
        /* Target only the text part inside bot bubble */
        min-height: 1.5em; /* Ensure some min height while loading */
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-900 font-sans antialiased">
    <div
      class="max-w-4xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex flex-col gap-5"
    >
      <h1 class="text-3xl font-bold text-center text-gray-800 tracking-tight">
        📡 Proyecto STR
      </h1>

      <!-- Tabs -->
      <nav class="flex justify-center border-b border-gray-300 pb-0" id="tabs">
        <button data-tab="tts" class="tab">Texto a Voz</button>
        <button data-tab="agent" class="tab">Agente</button>
        <button data-tab="realtime" class="tab active">Conversación</button>
        <!-- Default Active Tab -->
        <button data-tab="pdf" class="tab">Documentos</button>
        <button data-tab="debug" class="tab">Debug</button>
      </nav>

      <!-- Panels Container -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <!-- Texto a Voz -->
        <section id="panel-tts" class="panel chat-container hidden">
          <div id="ttsFeed" class="chat-history"></div>
          <div
            class="chat-input-area flex flex-col sm:flex-row gap-3 items-start sm:items-center"
          >
            <textarea
              id="ttsInput"
              class="input-box"
              placeholder="Escribe texto (Shift+Enter para nueva línea)"
              rows="1"
            ></textarea>
            <div class="flex gap-2 flex-shrink-0 mt-2 sm:mt-0">
              <button id="ttsSend" class="btn btn-primary">Enviar</button>
              <button id="ttsClear" class="btn btn-secondary">Limpiar</button>
            </div>
          </div>
        </section>

        <!-- Agente -->
        <section id="panel-agent" class="panel chat-container hidden">
          <div id="agentFeed" class="chat-history"></div>
          <div
            class="chat-input-area flex flex-col sm:flex-row gap-3 items-start sm:items-center"
          >
            <textarea
              id="agentInput"
              class="input-box"
              placeholder="Pregunta (Shift+Enter para nueva línea)"
              rows="1"
            ></textarea>
            <div class="flex gap-2 flex-shrink-0 mt-2 sm:mt-0">
              <button id="agentSend" class="btn btn-primary">Enviar</button>
              <button id="agentClear" class="btn btn-secondary">Limpiar</button>
            </div>
          </div>
        </section>

        <!-- Conversación -->
        <!-- Default Visible Panel -->
        <section id="panel-realtime" class="panel chat-container">
          <div id="realtimeFeed" class="chat-history">
            <!-- Status will be dynamically updated -->
            <p id="realtimeStatus" class="status-message">Initializing...</p>
          </div>
          <div class="chat-input-area flex flex-col gap-4">
            <div class="flex flex-wrap gap-3 justify-center">
              <button id="startTalking" class="btn btn-primary" disabled>
                <!-- Initially disabled -->
                🎙️ Start Mic
              </button>
              <button id="stopTalking" class="btn btn-secondary" disabled>
                ⏹️ Stop Mic
              </button>
              <button id="rtClear" class="btn btn-secondary">Limpiar</button>
            </div>
            <div class="flex gap-3 items-center">
              <input
                type="text"
                id="realtimeText"
                class="input-box"
                placeholder="Enviar texto al aire (Enter para enviar)"
                disabled
              />
              <button
                id="realtimeTextSend"
                class="btn btn-primary flex-shrink-0"
                disabled
              >
                Enviar
              </button>
            </div>
          </div>
        </section>

        <!-- Documentos -->
        <section id="panel-pdf" class="panel chat-container hidden">
          <div id="pdfFeed" class="chat-history">
            <p id="pdfUploadStatus" class="status-message">
              Elige un PDF para cargar…
            </p>
          </div>
          <div class="chat-input-area flex flex-col gap-3">
            <input
              type="file"
              id="pdfFile"
              accept="application/pdf"
              class="block w-full text-sm text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer border border-gray-300 rounded-lg p-1"
            />
            <div
              id="pdfQA"
              class="hidden flex flex-col sm:flex-row gap-3 mt-2 items-center"
            >
              <input
                type="text"
                id="pdfQuestion"
                class="input-box flex-grow"
                placeholder="Pregunta sobre tu PDF (Enter para enviar)"
              />
              <div class="flex gap-2 flex-shrink-0">
                <button id="pdfAsk" class="btn btn-primary">Preguntar</button>
                <button id="pdfClear" class="btn btn-secondary">Limpiar</button>
              </div>
            </div>
          </div>
        </section>

        <!-- Debug -->
        <section id="panel-debug" class="panel chat-container hidden">
          <div id="debugFeed" class="chat-history">
            <p id="debugStatus" class="status-message">
              Herramientas de depuración
            </p>
          </div>
          <div class="chat-input-area flex flex-col gap-4">
            <!-- Play Tone -->
            <div class="flex flex-wrap gap-2 items-center">
              <span class="font-medium w-20 text-right">Tono:</span>
              <input
                type="number"
                id="toneFreq"
                class="input-box w-24 flex-shrink-0"
                placeholder="Hz"
                value="440"
              />
              <input
                type="number"
                id="toneDur"
                class="input-box w-24 flex-shrink-0"
                placeholder="ms"
                value="500"
              />
              <button id="tonePlay" class="btn btn-primary flex-shrink-0">
                Reproducir Tono
              </button>
            </div>
            <!-- LED -->
            <div class="flex flex-wrap gap-2 items-center">
              <span class="font-medium w-20 text-right">LED:</span>
              <button id="ledTest" class="btn btn-secondary flex-shrink-0">
                Test LED
              </button>
            </div>
            <!-- Button State -->
            <div class="flex flex-wrap gap-2 items-center">
              <span class="font-medium w-20 text-right">Botón:</span>
              <button id="btnState" class="btn btn-secondary flex-shrink-0">
                Leer Botón
              </button>
              <span id="btnResult" class="font-medium text-gray-700"></span>
            </div>
            <!-- Mic Record -->
            <div class="flex flex-wrap gap-2 items-center">
              <span class="font-medium w-20 text-right">Mic:</span>
              <button id="micStart" class="btn btn-primary flex-shrink-0">
                ⏺️ Start Rec
              </button>
              <button
                id="micStop"
                class="btn btn-secondary flex-shrink-0"
                disabled
              >
                ⏹️ Stop Rec
              </button>
            </div>
            <!-- Mic Playback -->
            <div class="flex flex-wrap gap-2 items-center">
              <span class="font-medium w-20 text-right">Audio:</span>
              <div class="flex-grow">
                <!-- Container for player -->
                <audio id="micPlayback" controls class="w-full"></audio>
                <span
                  id="micPlaybackStatus"
                  class="text-sm text-gray-500 italic"
                ></span>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script>
      // Use 'const' for variables that aren't reassigned, 'let' for those that are.
      const el = (sel) => document.querySelector(sel);
      const elAll = (sel) => document.querySelectorAll(sel);

      // --- Global State ---
      let currentBotBubble = null; // Track the bubble being updated by text_delta

      // --- WebSocket Connection ---
      // Ensure the transport is websocket for realtime
      const socket = io("/realtime", { transports: ["websocket"] });

      // --- UI Helper Functions ---
      function showToast(message, type = "info") {
        console.log(`TOAST (${type}): ${message}`);
        const toastContainer = el("#toast-container") || createToastContainer();
        const toast = document.createElement("div");
        toast.textContent = message;
        toast.className = `p-3 rounded-lg shadow-md text-white text-sm mb-2 transform transition-all duration-300 ease-out ${
          type === "error"
            ? "bg-red-600"
            : type === "success"
            ? "bg-green-600"
            : "bg-blue-600"
        }`;
        toast.style.opacity = "0";
        toast.style.transform = "translateY(20px)";
        toastContainer.insertBefore(toast, toastContainer.firstChild);
        requestAnimationFrame(() => {
          toast.style.opacity = "1";
          toast.style.transform = "translateY(0)";
        });
        setTimeout(() => {
          toast.style.opacity = "0";
          toast.style.transform = "translateY(-20px)";
          toast.addEventListener("transitionend", () => toast.remove());
        }, 3500);
      }
      function createToastContainer() {
        const container = document.createElement("div");
        container.id = "toast-container";
        container.className = "fixed bottom-5 right-5 z-50 w-64";
        document.body.appendChild(container);
        return container;
      }

      function feedClear(feedSel, statusSel = null, initialMsg = "") {
        const feed = el(feedSel);
        if (!feed) return;
        feed.innerHTML = ""; // Clear previous content
        currentBotBubble = null; // Reset current bot bubble tracking for this feed

        // Re-add status message if provided
        if (statusSel && initialMsg) {
          const statusP = document.createElement("p");
          statusP.id = statusSel.substring(1); // Remove # for ID
          statusP.className = "status-message";
          statusP.textContent = initialMsg;
          feed.appendChild(statusP);
        }
      }

      function appendBubble(feedSel, text, who, audioUrl = null) {
        const feed = el(feedSel);
        if (!feed) return;

        // Remove initial status message ONLY if it exists and we're adding the first bubble
        if (
          feed.children.length === 1 &&
          feed.children[0].classList.contains("status-message")
        ) {
          feed.children[0].remove();
        }

        const bubbleDiv = document.createElement("div");
        bubbleDiv.className = `bubble ${who} flex flex-col`;
        const textP = document.createElement("p");
        textP.className = `${who}-text`; // Add class for specific styling/selection
        textP.textContent = text;
        bubbleDiv.appendChild(textP);

        if (audioUrl) {
          try {
            const audio = document.createElement("audio");
            audio.controls = true;
            audio.preload = "metadata";
            audio.src = audioUrl;
            audio.className = "mt-2 w-full";
            bubbleDiv.appendChild(audio);
          } catch (e) {
            console.error("Error creating audio element:", e);
            const errorP = document.createElement("p");
            errorP.className = "text-red-500 text-xs mt-1";
            errorP.textContent = "Could not load audio player.";
            bubbleDiv.appendChild(errorP);
          }
        }
        feed.appendChild(bubbleDiv);

        // If this is a bot bubble, track it for potential delta updates
        if (who === "bot") {
          currentBotBubble = textP; // Track the text paragraph element
        } else {
          currentBotBubble = null; // Clear tracking if user bubble added
        }

        // Scroll to bottom
        requestAnimationFrame(() => {
          feed.scrollTo({ top: feed.scrollHeight, behavior: "smooth" });
        });

        return textP; // Return the text element for potential updates
      }

      // --- API Call Function (No changes needed) ---
      async function apiCall(endpoint, method = "POST", body = null) {
        try {
          const options = {
            method,
            headers: {},
          };
          if (body) {
            if (body instanceof FormData) {
              options.body = body;
            } else {
              options.headers["Content-Type"] = "application/json";
              options.body = JSON.stringify(body);
            }
          }
          const response = await fetch(endpoint, options);

          let data;
          const contentType = response.headers.get("content-type");
          if (contentType && contentType.includes("application/json")) {
            data = await response.json();
          } else {
            const text = await response.text();
            data = {
              success: response.ok,
              status_text: text || response.statusText,
            };
            if (!response.ok) {
              data.error = data.status_text;
            }
          }
          if (data.success === undefined) data.success = response.ok;
          if (!response.ok && !data.error) {
            data.error =
              data.message ||
              data.status_text ||
              `HTTP Error ${response.status}`;
          }
          return data;
        } catch (err) {
          console.error(`API call to ${endpoint} failed:`, err);
          return {
            success: false,
            error: err.message || "Network or script error",
          };
        }
      }

      // --- Tab Switching Logic ---
      const tabs = elAll("#tabs .tab");
      const panels = elAll(".panel");
      tabs.forEach((tab) => {
        tab.onclick = () => {
          tabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          const targetPanelId = `panel-${tab.dataset.tab}`;
          panels.forEach((p) => {
            p.classList.toggle("hidden", p.id !== targetPanelId);
          });
          // Reset current bubble tracking when switching tabs
          if (tab.dataset.tab !== "realtime") {
            currentBotBubble = null;
          }
        };
      });

      /* ====================================================== */
      /*                Input Handling & Submission             */
      /* ====================================================== */
      function setupEnterKeySubmission(inputId, buttonId, isTextarea = false) {
        const inputElement = el(inputId);
        const buttonElement = el(buttonId);
        if (!inputElement || !buttonElement) return;

        inputElement.addEventListener("keydown", (event) => {
          if (event.key === "Enter" && !buttonElement.disabled) {
            // Check if button is enabled
            if (isTextarea) {
              if (!event.shiftKey) {
                event.preventDefault();
                buttonElement.click();
              }
            } else {
              event.preventDefault();
              buttonElement.click();
            }
          }
        });

        if (isTextarea) {
          inputElement.addEventListener("input", () => {
            inputElement.style.height = "auto";
            inputElement.style.height = `${inputElement.scrollHeight}px`;
          });
          // Initial resize on load
          inputElement.style.height = "auto";
          inputElement.style.height = `${inputElement.scrollHeight}px`;
        }
      }

      // Setup Enter Key for relevant inputs
      setupEnterKeySubmission("#ttsInput", "#ttsSend", true);
      setupEnterKeySubmission("#agentInput", "#agentSend", true);
      setupEnterKeySubmission("#realtimeText", "#realtimeTextSend", false);
      setupEnterKeySubmission("#pdfQuestion", "#pdfAsk", false);

      /* ====================================================== */
      /*                      Tab Logic                         */
      /* ====================================================== */

      /* --- TTS --- */
      const ttsInput = el("#ttsInput"),
        ttsSendBtn = el("#ttsSend"),
        ttsFeed = "#ttsFeed";
      ttsSendBtn.onclick = async () => {
        /* ... (no changes needed) ... */
        const txt = ttsInput.value.trim();
        if (!txt) return;
        appendBubble(ttsFeed, txt, "user");
        ttsInput.value = "";
        ttsInput.style.height = "auto";
        ttsInput.focus();
        ttsSendBtn.disabled = true;
        const res = await apiCall("/api/tts", "POST", { text: txt });
        if (res.success && res.message) {
          appendBubble(ttsFeed, res.message, "bot", res.audio_url);
        } else {
          appendBubble(
            ttsFeed,
            `Error: ${res.error || "Unknown TTS error"}`,
            "bot"
          );
          showToast(`TTS Error: ${res.error || "Unknown"}`, "error");
        }
        ttsSendBtn.disabled = false;
      };
      el("#ttsClear").onclick = () => feedClear(ttsFeed);

      /* --- Agent --- */
      const agentInput = el("#agentInput"),
        agentSendBtn = el("#agentSend"),
        agentFeed = "#agentFeed";
      agentSendBtn.onclick = async () => {
        /* ... (no changes needed) ... */
        const q = agentInput.value.trim();
        if (!q) return;
        appendBubble(agentFeed, q, "user");
        agentInput.value = "";
        agentInput.style.height = "auto";
        agentInput.focus();
        agentSendBtn.disabled = true;
        const res = await apiCall("/api/agent", "POST", { query: q });
        if (res.success && res.message) {
          appendBubble(agentFeed, res.message, "bot", res.audio_url);
        } else {
          appendBubble(
            agentFeed,
            `Error: ${res.error || "Unknown agent error"}`,
            "bot"
          );
          showToast(`Agent Error: ${res.error || "Unknown"}`, "error");
        }
        agentSendBtn.disabled = false;
      };
      el("#agentClear").onclick = () => feedClear(agentFeed);

      /* --- Realtime (MODIFIED) --- */
      const startBtn = el("#startTalking"),
        stopBtn = el("#stopTalking"),
        rtStatus = el("#realtimeStatus"),
        realtimeFeed = "#realtimeFeed",
        rtText = el("#realtimeText"),
        rtTextSend = el("#realtimeTextSend"),
        rtClearBtn = el("#rtClear");

      startBtn.onclick = () => {
        currentBotBubble = null; // Reset bubble tracking on new recording
        socket.emit("start_talking");
      };
      stopBtn.onclick = () => socket.emit("stop_talking");
      rtClearBtn.onclick = () => {
        // Clear feed and reset status based on connection state
        const currentStatus = rtStatus.textContent;
        feedClear(
          realtimeFeed,
          "#realtimeStatus",
          currentStatus.includes("Error") ||
            currentStatus.includes("Disconnected")
            ? currentStatus
            : "Ready."
        );
      };
      rtTextSend.onclick = () => {
        const m = rtText.value.trim();
        if (!m) return;
        appendBubble(realtimeFeed, m, "user"); // Add user message
        currentBotBubble = null; // Expect a new bot response, clear tracking
        rtText.value = "";
        rtText.focus();
        socket.emit("send_text", { text: m });
      };

      // -- Socket.IO listeners for Realtime (MODIFIED) --
      socket.on("status", (d) => {
        const msg = d.message || "Status unknown";
        rtStatus.textContent = msg;
        console.log("Status received:", msg); // Debug log

        // Enable/disable buttons based on status
        if (
          msg.includes("Error") ||
          msg.includes("Disconnected") ||
          msg.includes("unavailable")
        ) {
          startBtn.disabled = true;
          stopBtn.disabled = true;
          rtText.disabled = true;
          rtTextSend.disabled = true;
        } else if (msg === "Connecting...") {
          startBtn.disabled = true;
          stopBtn.disabled = true;
          rtText.disabled = true;
          rtTextSend.disabled = true;
        } else if (msg === "Ready.") {
          startBtn.disabled = false;
          stopBtn.disabled = true;
          rtText.disabled = false;
          rtTextSend.disabled = false;
          currentBotBubble = null; // Ensure bubble tracking is cleared when ready
        } else if (msg === "Recording...") {
          startBtn.disabled = true;
          stopBtn.disabled = false;
          rtText.disabled = true; // Disable text input while recording
          rtTextSend.disabled = true;
          currentBotBubble = null; // Recording started, no active bot bubble yet
        } else if (msg === "Processing...") {
          startBtn.disabled = true; // Can't start while processing
          stopBtn.disabled = true; // Can't stop while already processing
          rtText.disabled = false; // Allow sending text while processing audio? Maybe disable.
          rtTextSend.disabled = false; // Let's disable for simplicity.
          rtText.disabled = true;
          rtTextSend.disabled = true;
        } else {
          // Default state (e.g., Connected) - similar to Ready
          startBtn.disabled = false;
          stopBtn.disabled = true;
          rtText.disabled = false;
          rtTextSend.disabled = false;
        }
      });

      socket.on("text_delta", (d) => {
        const delta = d.delta || "";
        // console.log("Delta:", delta); // Debug log for delta

        if (!currentBotBubble) {
          // If no current bubble, create a new one
          console.log("Creating new bot bubble for delta.");
          // Add a placeholder or the first delta piece
          appendBubble(realtimeFeed, delta, "bot");
          // currentBotBubble is now set by appendBubble
        } else {
          // Append delta to the existing tracked bubble's text content
          currentBotBubble.textContent += delta;
          // Scroll to bottom as text grows
          const feed = el(realtimeFeed);
          if (feed) {
            requestAnimationFrame(() => {
              feed.scrollTo({ top: feed.scrollHeight, behavior: "auto" }); // Use auto scroll during delta for performance
            });
          }
        }
      });

      // No broadcast_text event anymore, audio is played by server triggering playback
      // socket.on("broadcast_text", ...) -> REMOVED

      socket.on("connect", () => {
        console.log("Realtime WebSocket connected.");
        // Status update will be sent by server on connect
        // rtStatus.textContent = "Connected. Ready.";
        // startBtn.disabled = false;
        // stopBtn.disabled = true;
        // rtText.disabled = false;
        // rtTextSend.disabled = false;
      });
      socket.on("disconnect", (reason) => {
        console.log(`Realtime WebSocket disconnected: ${reason}`);
        rtStatus.textContent = "Disconnected. Check server.";
        startBtn.disabled = true;
        stopBtn.disabled = true;
        rtText.disabled = true;
        rtTextSend.disabled = true;
        showToast("Realtime connection lost.", "error");
        currentBotBubble = null; // Reset tracking on disconnect
      });
      socket.on("connect_error", (err) => {
        console.error(`Realtime connection error: ${err.message}`);
        rtStatus.textContent = `Connection Error: ${err.message}`;
        startBtn.disabled = true;
        stopBtn.disabled = true;
        rtText.disabled = true;
        rtTextSend.disabled = true;
        showToast(`Realtime connection error: ${err.message}`, "error");
        currentBotBubble = null; // Reset tracking on error
      });

      /* --- PDF --- */
      let currentPDF = null;
      const pdfFile = el("#pdfFile"),
        pdfAskBtn = el("#pdfAsk"),
        pdfQuestion = el("#pdfQuestion"),
        pdfClearBtn = el("#pdfClear"),
        pdfFeed = "#pdfFeed",
        pdfStatus = el("#pdfUploadStatus"),
        pdfQA = el("#pdfQA");
      pdfFile.onchange = async () => {
        /* ... (no changes needed) ... */
        const file = pdfFile.files[0];
        if (!file) return;
        pdfStatus.textContent = "⏳ Subiendo e indexando PDF…";
        pdfQA.classList.add("hidden");
        pdfAskBtn.disabled = true;
        pdfFile.disabled = true;
        currentPDF = null;
        const fd = new FormData();
        fd.append("file", file);
        const res = await apiCall("/api/pdf/upload", "POST", fd);
        if (res.success && res.filename) {
          currentPDF = res.filename;
          const txt = `✅ PDF listo: ${currentPDF}`;
          pdfStatus.textContent = txt;
          pdfQA.classList.remove("hidden");
          pdfAskBtn.disabled = false;
          pdfQuestion.value = "";
          pdfQuestion.focus();
          feedClear(pdfFeed, "#pdfUploadStatus", txt);
          showToast(`PDF "${currentPDF}" cargado`, "success");
        } else {
          pdfStatus.textContent = `⚠️ Error al cargar PDF: ${
            res.error || "Unknown"
          }`;
          pdfFile.value = "";
          showToast(`Error cargando PDF: ${res.error || "Unknown"}`, "error");
        }
        pdfFile.disabled = false;
      };
      pdfAskBtn.onclick = async () => {
        /* ... (no changes needed) ... */
        const q = pdfQuestion.value.trim();
        if (!q || !currentPDF) {
          showToast(
            "Escribe una pregunta y asegúrate que el PDF esté cargado.",
            "warning"
          );
          return;
        }
        appendBubble(pdfFeed, q, "user");
        pdfQuestion.value = "";
        pdfQuestion.focus();
        pdfAskBtn.disabled = true;
        const res = await apiCall("/api/pdf/ask", "POST", {
          question: q,
          filename: currentPDF,
        });
        if (res.success && res.answer) {
          appendBubble(pdfFeed, res.answer, "bot", res.audio_url);
        } else {
          appendBubble(
            pdfFeed,
            `Error: ${res.error || "Unknown PDF query error"}`,
            "bot"
          );
          showToast(
            `Error en consulta PDF: ${res.error || "Unknown"}`,
            "error"
          );
        }
        pdfAskBtn.disabled = false;
      };
      pdfClearBtn.onclick = () => {
        /* ... (no changes needed) ... */
        const txt = currentPDF
          ? `✅ PDF listo: ${currentPDF}`
          : "Elige un PDF para cargar…";
        feedClear(pdfFeed, "#pdfUploadStatus", txt);
      };

      /* --- Debug Controls --- */
      const debugStatus = el("#debugStatus");
      // Tone
      el("#tonePlay").onclick = async () => {
        /* ... (no changes needed) ... */
        const f = +el("#toneFreq").value || 440;
        const d = +el("#toneDur").value || 500;
        debugStatus.textContent = "Generando y reproduciendo tono...";
        const res = await apiCall(
          `/api/debug/tone?frequency=${f}&duration=${d}`,
          "POST"
        );
        if (res.success) {
          showToast(`Tono ${f}Hz reproducido`, "success");
          debugStatus.textContent = `Tono ${f}Hz reproducido.`;
        } else {
          showToast(`Error con el tono: ${res.error}`, "error");
          debugStatus.textContent = `Error con el tono: ${res.error}`;
        }
      };
      // LED
      el("#ledTest").onclick = async () => {
        /* ... (no changes needed) ... */
        debugStatus.textContent = "Probando LED...";
        const res = await apiCall("/api/debug/led", "POST");
        if (res.success) {
          showToast("Secuencia LED iniciada", "success");
          debugStatus.textContent = "Secuencia LED iniciada.";
        } else {
          showToast(`Error de LED: ${res.error}`, "error");
          debugStatus.textContent = `Error de LED: ${res.error}`;
        }
      };
      // Button State
      el("#btnState").onclick = async () => {
        /* ... (no changes needed) ... */
        debugStatus.textContent = "Leyendo botón...";
        const res = await apiCall("/api/debug/button", "GET");
        const btnResultSpan = el("#btnResult");
        if (res.success && res.pressed !== undefined) {
          btnResultSpan.textContent = res.pressed ? "Presionado" : "Suelto";
          debugStatus.textContent = `Estado botón: ${btnResultSpan.textContent}.`;
        } else {
          btnResultSpan.textContent = "Error";
          showToast(`Error leyendo botón: ${res.error}`, "error");
          debugStatus.textContent = `Error leyendo botón: ${res.error}`;
        }
      };
      // Mic Record Start/Stop
      const micStartBtn = el("#micStart"),
        micStopBtn = el("#micStop"),
        micAudio = el("#micPlayback"),
        micPlaybackStatus = el("#micPlaybackStatus");
      micStartBtn.onclick = async () => {
        /* ... (no changes needed) ... */
        debugStatus.textContent = "Iniciando grabación...";
        micPlaybackStatus.textContent = "";
        micAudio.style.display = "none";
        micAudio.src = "";
        micStartBtn.disabled = true;
        const res = await apiCall("/api/debug/mic/start", "POST");
        if (res.success) {
          micStopBtn.disabled = false;
          showToast("Grabación iniciada", "info");
          debugStatus.textContent = "⏺️ Grabando...";
        } else {
          micStartBtn.disabled = false;
          showToast(`Error al iniciar grabación: ${res.error}`, "error");
          debugStatus.textContent = `Error al iniciar: ${res.error}`;
        }
      };
      micStopBtn.onclick = async () => {
        /* ... (no changes needed) ... */
        debugStatus.textContent = "Deteniendo grabación...";
        micStopBtn.disabled = true;
        const res = await apiCall("/api/debug/mic/stop", "POST");
        if (res.success && res.audio_url) {
          micAudio.src = res.audio_url;
          micAudio.style.display = "block";
          micPlaybackStatus.textContent = `Grabación guardada: ${res.audio_url
            .split("/")
            .pop()}`;
          showToast("Grabación detenida y guardada", "success");
          debugStatus.textContent =
            "Grabación detenida. Lista para reproducir.";
        } else {
          micPlaybackStatus.textContent = `Error: ${
            res.error || "No se pudo guardar"
          }`;
          showToast(
            `Error al detener/guardar: ${res.error || "Unknown"}`,
            "error"
          );
          debugStatus.textContent = `Error al detener: ${
            res.error || "Unknown"
          }`;
        }
        micStartBtn.disabled = false;
      };

      // --- Initial UI State ---
      // Ensure the correct tab is shown on load
      document.addEventListener("DOMContentLoaded", () => {
        tabs.forEach((t) => t.classList.remove("active"));
        panels.forEach((p) => p.classList.add("hidden"));
        el('button[data-tab="realtime"]').classList.add("active");
        el("#panel-realtime").classList.remove("hidden");

        // Attempt initial connection status check if socket connected quickly
        if (socket.connected) {
          socket.emit("request_status"); // Or rely on server sending status on connect
        }
      });
    </script>
  </body>
</html>
