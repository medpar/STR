<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>STR Proyecto</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        background: #f7f7f7;
      }
      .container {
        max-width: 800px;
        margin: 20px auto;
      }
      .tab {
        overflow: hidden;
        background: #333;
      }
      .tab button {
        border: none;
        outline: 0;
        cursor: pointer;
        padding: 14px 16px;
        font-size: 17px;
        color: #fff;
        background: inherit;
        transition: 0.3s;
      }
      .tab button:hover,
      .tab button.active {
        background: #575757;
      }
      .tabcontent {
        display: none;
        padding: 20px;
        background: #fff;
      }
      textarea {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        resize: vertical;
        min-height: 100px;
      }
      .submit-btn {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 4px;
        background: #007bff;
        color: #fff;
        cursor: pointer;
      }
      .submit-btn:hover {
        background: #0056b3;
      }
      audio {
        width: 100%;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="tab">
        <button class="tablinks" onclick="openTab(event,'TTS')" id="defaultTab">
          Text‑to‑Speech
        </button>
        <button class="tablinks" onclick="openTab(event,'Agent')">
          Agent Query
        </button>
        <button class="tablinks" onclick="openTab(event,'Realtime')">
          Real‑time
        </button>
      </div>

      <!-- -----------------  TTS  ----------------- -->
      <div id="TTS" class="tabcontent">
        <h2>Text‑to‑Speech</h2>
        <textarea id="ttsInput" placeholder="Escribe texto…"></textarea><br />
        <button class="submit-btn" onclick="sendTTSRequest()">Enviar</button>
        <div id="ttsResult"></div>
      </div>

      <!-- -----------------  Agent  ---------------- -->
      <div id="Agent" class="tabcontent">
        <h2>Agent Query</h2>
        <textarea id="agentInput" placeholder="Pregunta…"></textarea><br />
        <button class="submit-btn" onclick="sendAgentRequest()">Enviar</button>
        <div id="agentResult"></div>
      </div>

      <!-- ---------------  Realtime  --------------- -->
      <div id="Realtime" class="tabcontent">
        <h2>Speech‑to‑Speech (micro USB local)</h2>
        <button id="startTalking">Start Talking</button>
        <button id="stopTalking" disabled>Stop Talking</button>
        <div id="realtimeStatus" style="margin-top: 20px; color: #555"></div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <script>
      const socket = io("/realtime");

      /* ------------ tab UI ------------*/
      function openTab(evt, name) {
        Array.from(document.getElementsByClassName("tabcontent")).forEach(
          (e) => (e.style.display = "none")
        );
        Array.from(document.getElementsByClassName("tablinks")).forEach((e) =>
          e.classList.remove("active")
        );
        document.getElementById(name).style.display = "block";
        evt.currentTarget.classList.add("active");
      }
      document.getElementById("defaultTab").click();

      /* ------------ TTS ---------------*/
      async function sendTTSRequest() {
        const text = document.getElementById("ttsInput").value.trim();
        if (!text) {
          alert("Introduce texto");
          return;
        }
        const res = await fetch("/api/tts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        const json = await res.json();
        if (res.ok) {
          document.getElementById(
            "ttsResult"
          ).innerHTML = `<p>${json.message}</p><audio controls src="${json.audio_url}"></audio>`;
          document.getElementById("ttsInput").value = "";
        } else alert(json.error);
      }

      /* ------------ Agent -------------*/
      async function sendAgentRequest() {
        const query = document.getElementById("agentInput").value.trim();
        if (!query) {
          alert("Introduce consulta");
          return;
        }
        const res = await fetch("/api/agent", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });
        const json = await res.json();
        if (res.ok) {
          document.getElementById(
            "agentResult"
          ).innerHTML = `<p>${json.message}</p><audio controls src="${json.audio_url}"></audio>`;
          document.getElementById("agentInput").value = "";
        } else alert(json.error);
      }

      /* ------------ Realtime ----------*/
      document.getElementById("startTalking").onclick = () => {
        socket.emit("start_talking");
        document.getElementById("startTalking").disabled = true;
        document.getElementById("stopTalking").disabled = false;
        document.getElementById("realtimeStatus").innerText = "Recording…";
      };

      document.getElementById("stopTalking").onclick = () => {
        socket.emit("stop_talking");
        document.getElementById("stopTalking").disabled = true;
        document.getElementById("startTalking").disabled = false;
        document.getElementById("realtimeStatus").innerText = "Processing…";
      };

      socket.on("status", (d) => {
        document.getElementById("realtimeStatus").innerText = d.message;
      });
      socket.on("broadcast_text", (d) => {
        document.getElementById("realtimeStatus").innerText = d.message;
      });
    </script>
  </body>
</html>
