<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STR Proyecto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <style>
      /* Basic chat styling & Layout */
      .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 200px); /* Adjust as needed */
        max-height: 70vh;
        min-height: 300px;
      }
      .chat-history {
        flex-grow: 1;
        overflow-y: auto;
        padding: 1rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        background-color: #f9fafb;
      }
      .chat-input-area {
        padding: 1rem 1.5rem;
        border-top: 1px solid #e5e7eb;
        background-color: #ffffff;
        flex-shrink: 0;
      }
      .input-box {
        padding: 0.6rem 1rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        flex-grow: 1;
        outline: none;
        transition: border-color 0.2s ease;
        resize: none;
      }
      .input-box:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 1px #2563eb;
      }
      .bubble {
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        max-width: 85%;
        word-wrap: break-word;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        line-height: 1.5;
      }
      .user {
        background-color: #dbeafe;
        color: #1e3a8a;
        align-self: flex-end;
        border-bottom-right-radius: 0.25rem;
        margin-left: auto;
      }
      .bot {
        background-color: #e5e7eb;
        color: #1f2937;
        align-self: flex-start;
        border-bottom-left-radius: 0.25rem;
        margin-right: auto;
      }
      /* Buttons */
      .btn {
        padding: 0.5rem 1.1rem;
        border-radius: 0.375rem;
        font-weight: 500;
        white-space: nowrap;
        transition: background-color 0.2s ease, box-shadow 0.2s ease;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .btn:focus {
        outline: none;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
      }
      .btn-primary {
        background-color: #2563eb;
        color: white;
      }
      .btn-primary:hover {
        background-color: #1d4ed8;
      }
      .btn-primary:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
        opacity: 0.7;
      }
      .btn-secondary {
        background-color: #6b7280;
        color: white;
      }
      .btn-secondary:hover {
        background-color: #4b5563;
      }
      .btn-secondary:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
        opacity: 0.7;
      }
      audio {
        width: 100%;
        margin-top: 0.75rem;
        display: block;
        height: 40px;
      }
      /* Tab styling */
      .tab {
        padding: 0.75rem 1.25rem;
        border-bottom: 3px solid transparent;
        color: #4b5563;
        font-weight: 500;
        transition: all 0.2s ease;
        text-align: center;
      }
      .tab:hover {
        color: #1d4ed8;
        background-color: #eff6ff;
      }
      .tab.active {
        border-color: #2563eb;
        color: #1e40af;
        font-weight: 600;
      }
      /* Hide scrollbar */
      .chat-history::-webkit-scrollbar {
        display: none;
      }
      .chat-history {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Status message */
      .status-message {
        text-align: center;
        font-size: 0.875rem;
        color: #6b7280;
        padding: 0.5rem 1rem;
        background-color: #f3f4f6;
        border-radius: 9999px;
        align-self: center;
        margin: 0.5rem auto;
      }
      /* Bluetooth Switch Styling */
      .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 24px;
        flex-shrink: 0;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 24px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #2563eb;
      }
      input:focus + .slider {
        box-shadow: 0 0 1px #2563eb;
      }
      input:checked + .slider:before {
        transform: translateX(26px);
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-900 font-sans antialiased">
    <div
      class="max-w-4xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex flex-col gap-5"
    >
      <h1 class="text-3xl font-bold text-center text-gray-800 tracking-tight">
        📡 Proyecto STR
      </h1>

      <!-- Tabs -->
      <nav class="flex justify-center border-b border-gray-300 pb-0" id="tabs">
        <button data-tab="tts" class="tab active">TTS</button>
        <button data-tab="agent" class="tab">Agent</button>
        <button data-tab="realtime" class="tab">Realtime</button>
        <button data-tab="pdf" class="tab">PDF</button>
        <button data-tab="bluetooth" class="tab">Bluetooth</button>
      </nav>

      <!-- Panels Container -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <!-- ------------ TTS ------------- -->
        <section id="panel-tts" class="panel chat-container">
          <div id="ttsFeed" class="chat-history"></div>
          <div
            class="chat-input-area flex flex-col sm:flex-row gap-3 items-center"
          >
            <textarea
              id="ttsInput"
              class="input-box"
              placeholder="Escribe texto…"
              rows="1"
            ></textarea>
            <div class="flex gap-2 flex-shrink-0">
              <button id="ttsSend" class="btn btn-primary">Enviar</button>
              <button id="ttsClear" class="btn btn-secondary">Limpiar</button>
            </div>
          </div>
        </section>

        <!-- ------------ Agent ----------- -->
        <section id="panel-agent" class="panel chat-container hidden">
          <div id="agentFeed" class="chat-history"></div>
          <div
            class="chat-input-area flex flex-col sm:flex-row gap-3 items-center"
          >
            <textarea
              id="agentInput"
              class="input-box"
              placeholder="Pregunta…"
              rows="1"
            ></textarea>
            <div class="flex gap-2 flex-shrink-0">
              <button id="agentSend" class="btn btn-primary">Enviar</button>
              <button id="agentClear" class="btn btn-secondary">Limpiar</button>
            </div>
          </div>
        </section>

        <!-- -------- Realtime ------------ -->
        <section id="panel-realtime" class="panel chat-container hidden">
          <div id="realtimeFeed" class="chat-history">
            <p id="realtimeStatus" class="status-message">Initializing...</p>
          </div>
          <div class="chat-input-area flex flex-col gap-4">
            <div class="flex flex-wrap gap-3 justify-center">
              <button id="startTalking" class="btn btn-primary">
                🎙️ Start
              </button>
              <button id="stopTalking" class="btn btn-secondary" disabled>
                ⏹️ Stop
              </button>
              <button id="rtClear" class="btn btn-secondary">Limpiar</button>
            </div>
            <div class="flex gap-3 items-center">
              <input
                id="realtimeText"
                class="input-box"
                placeholder="Enviar texto al aire…"
              />
              <button
                id="realtimeTextSend"
                class="btn btn-primary flex-shrink-0"
              >
                Enviar
              </button>
            </div>
          </div>
        </section>

        <!-- ------------- PDF ------------ -->
        <section id="panel-pdf" class="panel chat-container hidden">
          <div id="pdfFeed" class="chat-history">
            <p id="pdfUploadStatus" class="status-message">
              Elige un PDF para cargar…
            </p>
          </div>
          <div class="chat-input-area flex flex-col gap-3">
            <input
              type="file"
              id="pdfFile"
              accept="application/pdf"
              class="block w-full text-sm text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer border border-gray-300 rounded-lg p-1"
            />
            <div
              id="pdfQA"
              class="hidden flex flex-col sm:flex-row gap-3 mt-2 items-center"
            >
              <input
                id="pdfQuestion"
                class="input-box flex-grow"
                placeholder="Pregunta sobre tu PDF…"
              />
              <div class="flex gap-2 flex-shrink-0">
                <button id="pdfAsk" class="btn btn-primary">Preguntar</button>
                <button id="pdfClear" class="btn btn-secondary">Limpiar</button>
              </div>
            </div>
          </div>
        </section>

        <!-- ---------- Bluetooth ----------- -->
        <section
          id="panel-bluetooth"
          class="panel hidden p-6 flex flex-col gap-4 items-center"
        >
          <h2 class="text-xl font-semibold text-gray-700">Control Bluetooth</h2>
          <div
            class="flex items-center justify-between gap-4 p-4 border border-gray-200 rounded-lg bg-gray-50 w-full max-w-md"
          >
            <span class="font-medium text-gray-600"
              >Enable Discoverable & Pairing:</span
            >
            <label class="switch">
              <input type="checkbox" id="btToggle" />
              <span class="slider"></span>
            </label>
          </div>
          <div
            id="bluetoothStatus"
            class="mt-4 text-sm text-gray-600 p-3 border border-gray-200 rounded-lg bg-gray-50 w-full max-w-md"
          >
            <p>
              <strong>Status:</strong>
              <span id="btStatusText">Fetching...</span>
            </p>
            <p>
              <strong>Powered:</strong>
              <span id="btPowered" class="font-medium">...</span>
            </p>
            <p>
              <strong>Discoverable:</strong>
              <span id="btDiscoverable" class="font-medium">...</span>
            </p>
            <p>
              <strong>Pairable:</strong>
              <span id="btPairable" class="font-medium">...</span>
            </p>
            <p id="btError" class="text-red-600 mt-1 font-semibold"></p>
          </div>
          <p class="text-xs text-gray-500 max-w-md text-center mt-2">
            Note: System configuration (e.g., /etc/bluetooth/main.conf) might
            override runtime settings.
          </p>
          <button id="btRefreshStatus" class="btn btn-secondary mt-2">
            Refresh Status
          </button>
        </section>
      </div>
      <!-- End Card-like container -->
    </div>

    <script>
      const socket = io("/realtime", { transports: ["websocket"] });
      const el = (sel) => document.querySelector(sel);
      const elAll = (sel) => document.querySelectorAll(sel);

      // --- Helper Functions ---
      function showToast(message, type = "info") {
        // Replace with a proper toast library if needed
        console.log(`TOAST (${type}): ${message}`);
        const toast = document.createElement("div");
        toast.textContent = message;
        toast.className = `fixed bottom-5 right-5 p-3 rounded-lg shadow-md text-white ${
          type === "error"
            ? "bg-red-500"
            : type === "success"
            ? "bg-green-500"
            : "bg-blue-500"
        }`;
        document.body.appendChild(toast);
        setTimeout(() => {
          toast.remove();
        }, 3000);
      }

      const feedClear = (feedSel, statusSel = null, initialMsg = "") => {
        const feed = el(feedSel);
        if (!feed) return;
        feed.innerHTML = "";
        if (statusSel) {
          const statusElement = el(statusSel);
          if (statusElement) {
            if (feed.contains(statusElement)) {
              // Check if status is INSIDE feed
              const p = document.createElement("p");
              p.id = statusElement.id;
              p.className = "status-message"; // Use consistent class
              p.textContent = initialMsg;
              feed.appendChild(p);
            } else {
              // Status is OUTSIDE feed
              statusElement.textContent = initialMsg;
            }
          }
        }
      };

      function appendBubble(feedSel, text, who, audioUrl = null) {
        const feed = el(feedSel);
        if (!feed) return;
        const statusMsg = feed.querySelector(".status-message");
        if (
          statusMsg &&
          feed.children.length === 1 &&
          feed.firstChild === statusMsg
        ) {
          statusMsg.remove();
        }
        const bubbleDiv = document.createElement("div");
        bubbleDiv.className = `bubble ${who}`;
        const textNode = document.createElement("p");
        textNode.textContent = text;
        bubbleDiv.appendChild(textNode);
        if (audioUrl) {
          try {
            const audio = document.createElement("audio");
            audio.controls = true;
            audio.preload = "metadata";
            audio.src = audioUrl;
            audio.className = "mt-2 w-full";
            bubbleDiv.appendChild(audio);
          } catch (e) {
            console.error("Error creating audio element:", e);
            const errorP = document.createElement("p");
            errorP.className = "text-red-500 text-xs mt-1";
            errorP.textContent = "Could not load audio player.";
            bubbleDiv.appendChild(errorP);
          }
        }
        feed.appendChild(bubbleDiv);
        requestAnimationFrame(() => {
          feed.scrollTo({ top: feed.scrollHeight, behavior: "smooth" });
        });
      }

      async function apiCall(endpoint, method = "POST", body = null) {
        try {
          const options = { method: method, headers: {} };
          if (body) {
            if (body instanceof FormData) {
              // Let browser set Content-Type for FormData
              options.body = body;
            } else {
              options.headers["Content-Type"] = "application/json";
              options.body = JSON.stringify(body);
            }
          }
          const response = await fetch(endpoint, options);
          // Try parsing JSON, but handle potential non-JSON error responses
          let data;
          const contentType = response.headers.get("content-type");
          if (contentType && contentType.indexOf("application/json") !== -1) {
            data = await response.json();
          } else {
            // Handle plain text or other error types
            const text = await response.text();
            data = {
              success: response.ok,
              error: text || `HTTP error ${response.status}`,
            };
          }

          // Add success based on HTTP status if not present in JSON
          if (typeof data.success === "undefined") {
            data.success = response.ok;
          }
          if (!response.ok && !data.error) {
            data.error = data.message || `HTTP error ${response.status}`;
          }
          return data;
        } catch (error) {
          console.error(`API call to ${endpoint} failed:`, error);
          return { success: false, error: error.message };
        }
      }

      /* ---------- Tabs ---------- */
      const tabs = elAll("#tabs .tab");
      const panels = elAll(".panel");
      tabs.forEach((tab) => {
        tab.onclick = () => {
          tabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          const targetPanelId = `panel-${tab.dataset.tab}`;
          panels.forEach((p) => {
            if (p.id === targetPanelId) {
              p.classList.remove("hidden");
              const history = p.querySelector(".chat-history");
              if (history) {
                requestAnimationFrame(() => {
                  history.scrollTop = history.scrollHeight;
                });
              }
              if (tab.dataset.tab === "bluetooth") {
                refreshBluetoothStatus();
              }
            } else {
              p.classList.add("hidden");
            }
          });
        };
      });

      /* ---------- TTS ---------- */
      const ttsInput = el("#ttsInput");
      const ttsSendBtn = el("#ttsSend");
      const ttsFeed = "#ttsFeed";
      ttsSendBtn.onclick = async () => {
        const txt = ttsInput.value.trim();
        if (!txt) return;
        appendBubble(ttsFeed, txt, "user");
        ttsInput.value = "";
        ttsInput.focus();
        ttsSendBtn.disabled = true;
        const result = await apiCall("/api/tts", "POST", { text: txt });
        if (result && result.success && result.message) {
          appendBubble(ttsFeed, result.message, "bot", result.audio_url);
        } else {
          appendBubble(
            ttsFeed,
            `Error: ${result.error || "Unknown TTS error"}`,
            "bot"
          );
        }
        ttsSendBtn.disabled = false;
      };
      el("#ttsClear").onclick = () => feedClear(ttsFeed);
      ttsInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          ttsSendBtn.click();
        }
      });

      /* ---------- Agent ---------- */
      const agentInput = el("#agentInput");
      const agentSendBtn = el("#agentSend");
      const agentFeed = "#agentFeed";
      agentSendBtn.onclick = async () => {
        const q = agentInput.value.trim();
        if (!q) return;
        appendBubble(agentFeed, q, "user");
        agentInput.value = "";
        agentInput.focus();
        agentSendBtn.disabled = true;
        const result = await apiCall("/api/agent", "POST", { query: q });
        if (result && result.success && result.message) {
          appendBubble(agentFeed, result.message, "bot", result.audio_url);
        } else {
          appendBubble(
            agentFeed,
            `Error: ${result.error || "Unknown Agent error"}`,
            "bot"
          );
        }
        agentSendBtn.disabled = false;
      };
      el("#agentClear").onclick = () => feedClear(agentFeed);
      agentInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          agentSendBtn.click();
        }
      });

      /* ---------- Realtime ---------- */
      const rtStatusEl = el("#realtimeStatus");
      const startBtn = el("#startTalking");
      const stopBtn = el("#stopTalking");
      const rtTextInput = el("#realtimeText");
      const rtTextSendBtn = el("#realtimeTextSend");
      const realtimeFeed = "#realtimeFeed";
      startBtn.onclick = () => socket.emit("start_talking");
      stopBtn.onclick = () => socket.emit("stop_talking");
      el("#rtClear").onclick = () =>
        feedClear(realtimeFeed, "#realtimeStatus", "Ready");
      rtTextSendBtn.onclick = () => {
        const m = rtTextInput.value.trim();
        if (!m) return;
        appendBubble(realtimeFeed, m, "user");
        rtTextInput.value = "";
        rtTextInput.focus();
        socket.emit("send_text", { text: m });
      };
      rtTextInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          rtTextSendBtn.click();
        }
      });
      socket.on("status", (d) => {
        if (rtStatusEl) rtStatusEl.textContent = d.message;
        if (d.message === "Recording…") {
          startBtn.disabled = true;
          stopBtn.disabled = false;
        } else if (d.message === "Ready" || d.message.startsWith("Error:")) {
          startBtn.disabled = false;
          stopBtn.disabled = true;
        } else {
          startBtn.disabled = true;
          stopBtn.disabled = true;
        }
      });
      socket.on("broadcast_text", (d) => {
        appendBubble(realtimeFeed, d.message, "bot");
        if (rtStatusEl) rtStatusEl.textContent = "Ready";
        startBtn.disabled = false;
        stopBtn.disabled = true;
      });
      socket.on("connect", () => {
        console.log("Realtime Socket Connected");
        if (rtStatusEl) rtStatusEl.textContent = "Connected. Ready.";
        startBtn.disabled = false;
        stopBtn.disabled = true;
      });
      socket.on("disconnect", () => {
        console.log("Realtime Socket Disconnected");
        if (rtStatusEl) rtStatusEl.textContent = "Disconnected. Please reload.";
        startBtn.disabled = true;
        stopBtn.disabled = true;
      });
      socket.on("connect_error", (err) => {
        console.error("Realtime Socket Connection Error:", err);
        if (rtStatusEl)
          rtStatusEl.textContent = `Connection Error: ${err.message}`;
        startBtn.disabled = true;
        stopBtn.disabled = true;
      });

      /* ---------- PDF ---------- */
      let currentPDF = null;
      const pdfStatusEl = el("#pdfUploadStatus");
      const pdfQASection = el("#pdfQA");
      const pdfFileInput = el("#pdfFile");
      const pdfQuestionInput = el("#pdfQuestion");
      const pdfAskBtn = el("#pdfAsk");
      const pdfFeed = "#pdfFeed";
      pdfFileInput.onchange = async () => {
        const file = pdfFileInput.files[0];
        if (!file) return;
        pdfStatusEl.textContent = "⏳ Subiendo e indexando…";
        pdfStatusEl.classList.remove("hidden");
        pdfQASection.classList.add("hidden");
        pdfAskBtn.disabled = true;
        currentPDF = null;
        const formData = new FormData();
        formData.append("file", file);
        const result = await apiCall("/api/pdf/upload", "POST", formData);
        if (result && result.success && result.filename) {
          currentPDF = result.filename;
          const statusText = `✅ PDF listo: ${currentPDF}`;
          pdfStatusEl.textContent = statusText;
          pdfQASection.classList.remove("hidden");
          pdfAskBtn.disabled = false;
          pdfQuestionInput.focus();
          feedClear(pdfFeed, "#pdfUploadStatus", statusText); // Clear old chat for new PDF
        } else {
          pdfStatusEl.textContent = `⚠️ Error: ${
            result.error || "Upload failed"
          }`;
          pdfFileInput.value = "";
        }
      };
      pdfAskBtn.onclick = async () => {
        const q = pdfQuestionInput.value.trim();
        if (!q || !currentPDF) {
          showToast("Please enter question & ensure PDF is loaded.", "warning");
          return;
        }
        appendBubble(pdfFeed, q, "user");
        pdfQuestionInput.value = "";
        pdfQuestionInput.focus();
        pdfAskBtn.disabled = true;
        const result = await apiCall("/api/pdf/ask", "POST", {
          question: q,
          filename: currentPDF,
        });
        if (result && result.success && result.answer) {
          appendBubble(pdfFeed, result.answer, "bot", result.audio_url);
        } else {
          appendBubble(
            pdfFeed,
            `Error: ${result.error || "Could not get answer"}`,
            "bot"
          );
        }
        pdfAskBtn.disabled = false;
      };
      pdfQuestionInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          pdfAskBtn.click();
        }
      });
      el("#pdfClear").onclick = () => {
        const statusText = currentPDF
          ? `✅ PDF listo: ${currentPDF}`
          : "Elige un PDF para cargar…";
        feedClear(pdfFeed, "#pdfUploadStatus", statusText);
      };

      /* ---------- Bluetooth ---------- */
      const btToggle = el("#btToggle");
      const btStatusText = el("#btStatusText");
      const btPowered = el("#btPowered");
      const btDiscoverable = el("#btDiscoverable");
      const btPairable = el("#btPairable");
      const btError = el("#btError");
      const btRefreshBtn = el("#btRefreshStatus");

      // Function to update UI based on status data
      function updateBluetoothUI(statusData) {
        btPowered.textContent =
          statusData.powered === null
            ? "N/A"
            : statusData.powered
            ? "Yes"
            : "No";
        btDiscoverable.textContent =
          statusData.discoverable === null
            ? "N/A"
            : statusData.discoverable
            ? "Yes"
            : "No";
        btPairable.textContent =
          statusData.pairable === null
            ? "N/A"
            : statusData.pairable
            ? "Yes"
            : "No";

        // Set toggle state based on *both* being true (or based on powered status if appropriate)
        const isBtOn =
          statusData.powered && statusData.discoverable && statusData.pairable;
        btToggle.checked = isBtOn;
        btToggle.disabled = statusData.powered === null; // Disable if status is unknown

        if (statusData.error) {
          btStatusText.textContent = "Error";
          btError.textContent = statusData.error;
          btToggle.disabled = true; // Keep disabled on error
        } else {
          btStatusText.textContent = "OK";
          btError.textContent = ""; // Clear previous errors
        }
      }

      async function refreshBluetoothStatus() {
        btStatusText.textContent = "Fetching...";
        btPowered.textContent = "...";
        btDiscoverable.textContent = "...";
        btPairable.textContent = "...";
        btError.textContent = "";
        btToggle.disabled = true;
        btRefreshBtn.disabled = true;

        const result = await apiCall("/api/bluetooth/status", "GET");

        if (result) {
          // apiCall now always returns an object
          updateBluetoothUI(result); // Update UI with fetched data or error
        } else {
          // Should not happen with current apiCall, but handle just in case
          updateBluetoothUI({
            error: "Failed to fetch status: Invalid response.",
          });
        }
        btRefreshBtn.disabled = false; // Re-enable refresh button
      }

      btToggle.onchange = async () => {
        const enable = btToggle.checked;
        btToggle.disabled = true; // Disable during API call
        btRefreshBtn.disabled = true; // Disable refresh during change
        btStatusText.textContent = enable ? "Enabling..." : "Disabling...";
        btError.textContent = ""; // Clear previous errors

        // *** Call the NEW single endpoint ***
        const result = await apiCall("/api/bluetooth/set_mode", "POST", {
          enable: enable,
        });

        if (result && result.success) {
          showToast(
            result.message || `Bluetooth mode set to ${enable ? "ON" : "OFF"}`,
            "success"
          );
          // Refresh status after a short delay to allow system changes
          setTimeout(refreshBluetoothStatus, 1500);
        } else {
          const errMsg = result.error || "Failed to set Bluetooth mode.";
          showToast(`Error: ${errMsg}`, "error");
          btError.textContent = `Update failed: ${errMsg}`;
          // Revert toggle state visually on failure and refresh status immediately
          btToggle.checked = !enable; // Revert UI toggle
          refreshBluetoothStatus(); // Get actual current state which likely failed to change
        }
        // Re-enable is handled by refreshBluetoothStatus completing
      };

      btRefreshBtn.onclick = refreshBluetoothStatus;

      // --- Initial Setup ---
      document.addEventListener("DOMContentLoaded", () => {
        console.log("DOM Content Loaded");
        if (rtStatusEl) rtStatusEl.textContent = "Connecting...";
        startBtn.disabled = true;
        stopBtn.disabled = true;
        pdfQASection.classList.add("hidden");
        pdfAskBtn.disabled = true;
        // Optional: Initial BT status check on load, or wait for tab click
        // refreshBluetoothStatus();
      });
    </script>
  </body>
</html>
