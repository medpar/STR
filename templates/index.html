<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STR Proyecto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <style>
      /* Basic chat styling & Layout */
      .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 200px);
        max-height: 70vh;
        min-height: 300px;
      }
      .chat-history {
        flex-grow: 1;
        overflow-y: auto;
        padding: 1rem 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
        background-color: #f9fafb;
      }
      .chat-input-area {
        padding: 1rem 1.5rem;
        border-top: 1px solid #e5e7eb;
        background-color: #ffffff;
        flex-shrink: 0;
      }
      .input-box {
        padding: 0.6rem 1rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        flex-grow: 1;
        outline: none;
        transition: border-color 0.2s ease;
        resize: none;
      }
      .input-box:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 1px #2563eb;
      }
      .bubble {
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        max-width: 85%;
        word-wrap: break-word;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        line-height: 1.5;
      }
      .user {
        background-color: #dbeafe;
        color: #1e3a8a;
        align-self: flex-end;
        border-bottom-right-radius: 0.25rem;
        margin-left: auto;
      }
      .bot {
        background-color: #e5e7eb;
        color: #1f2937;
        align-self: flex-start;
        border-bottom-left-radius: 0.25rem;
        margin-right: auto;
      }
      /* Buttons */
      .btn {
        padding: 0.5rem 1.1rem;
        border-radius: 0.375rem;
        font-weight: 500;
        white-space: nowrap;
        transition: background-color 0.2s ease, box-shadow 0.2s ease;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .btn:focus {
        outline: none;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5);
      }
      .btn-primary {
        background-color: #2563eb;
        color: white;
      }
      .btn-primary:hover {
        background-color: #1d4ed8;
      }
      .btn-primary:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
        opacity: 0.7;
      }
      .btn-secondary {
        background-color: #6b7280;
        color: white;
      }
      .btn-secondary:hover {
        background-color: #4b5563;
      }
      .btn-secondary:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
        opacity: 0.7;
      }
      audio {
        width: 100%;
        margin-top: 0.75rem;
        display: block;
        height: 40px;
      }
      /* Tab styling */
      .tab {
        padding: 0.75rem 1.25rem;
        border-bottom: 3px solid transparent;
        color: #4b5563;
        font-weight: 500;
        transition: all 0.2s ease;
        text-align: center;
      }
      .tab:hover {
        color: #1d4ed8;
        background-color: #eff6ff;
      }
      .tab.active {
        border-color: #2563eb;
        color: #1e40af;
        font-weight: 600;
      }
      /* Hide scrollbar */
      .chat-history::-webkit-scrollbar {
        display: none;
      }
      .chat-history {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Status message */
      .status-message {
        text-align: center;
        font-size: 0.875rem;
        color: #6b7280;
        padding: 0.5rem 1rem;
        background-color: #f3f4f6;
        border-radius: 9999px;
        align-self: center;
        margin: 0.5rem auto;
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-900 font-sans antialiased">
    <div
      class="max-w-4xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex flex-col gap-5"
    >
      <h1 class="text-3xl font-bold text-center text-gray-800 tracking-tight">
        📡 Proyecto STR
      </h1>

      <!-- Tabs -->
      <nav class="flex justify-center border-b border-gray-300 pb-0" id="tabs">
        <button data-tab="tts" class="tab active">Texto a Voz</button>
        <button data-tab="agent" class="tab">Agente</button>
        <button data-tab="realtime" class="tab">Conversación</button>
        <button data-tab="pdf" class="tab">Documentos</button>
        <button data-tab="debug" class="tab">Debug</button>
      </nav>

      <!-- Panels Container -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <!-- Texto a Voz -->
        <section id="panel-tts" class="panel chat-container">
          <div id="ttsFeed" class="chat-history"></div>
          <div
            class="chat-input-area flex flex-col sm:flex-row gap-3 items-center"
          >
            <textarea
              id="ttsInput"
              class="input-box"
              placeholder="Escribe texto…"
              rows="1"
            ></textarea>
            <div class="flex gap-2 flex-shrink-0">
              <button id="ttsSend" class="btn btn-primary">Enviar</button>
              <button id="ttsClear" class="btn btn-secondary">Limpiar</button>
            </div>
          </div>
        </section>

        <!-- Agente -->
        <section id="panel-agent" class="panel chat-container hidden">
          <div id="agentFeed" class="chat-history"></div>
          <div
            class="chat-input-area flex flex-col sm:flex-row gap-3 items-center"
          >
            <textarea
              id="agentInput"
              class="input-box"
              placeholder="Pregunta…"
              rows="1"
            ></textarea>
            <div class="flex gap-2 flex-shrink-0">
              <button id="agentSend" class="btn btn-primary">Enviar</button>
              <button id="agentClear" class="btn btn-secondary">Limpiar</button>
            </div>
          </div>
        </section>

        <!-- Conversación -->
        <section id="panel-realtime" class="panel chat-container hidden">
          <div id="realtimeFeed" class="chat-history">
            <p id="realtimeStatus" class="status-message">Initializing...</p>
          </div>
          <div class="chat-input-area flex flex-col gap-4">
            <div class="flex flex-wrap gap-3 justify-center">
              <button id="startTalking" class="btn btn-primary">
                🎙️ Start
              </button>
              <button id="stopTalking" class="btn btn-secondary" disabled>
                ⏹️ Stop
              </button>
              <button id="rtClear" class="btn btn-secondary">Limpiar</button>
            </div>
            <div class="flex gap-3 items-center">
              <input
                id="realtimeText"
                class="input-box"
                placeholder="Enviar texto al aire…"
              />
              <button
                id="realtimeTextSend"
                class="btn btn-primary flex-shrink-0"
              >
                Enviar
              </button>
            </div>
          </div>
        </section>

        <!-- Documentos -->
        <section id="panel-pdf" class="panel chat-container hidden">
          <div id="pdfFeed" class="chat-history">
            <p id="pdfUploadStatus" class="status-message">
              Elige un PDF para cargar…
            </p>
          </div>
          <div class="chat-input-area flex flex-col gap-3">
            <input
              type="file"
              id="pdfFile"
              accept="application/pdf"
              class="block w-full text-sm text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer border border-gray-300 rounded-lg p-1"
            />
            <div
              id="pdfQA"
              class="hidden flex flex-col sm:flex-row gap-3 mt-2 items-center"
            >
              <input
                id="pdfQuestion"
                class="input-box flex-grow"
                placeholder="Pregunta sobre tu PDF…"
              />
              <div class="flex gap-2 flex-shrink-0">
                <button id="pdfAsk" class="btn btn-primary">Preguntar</button>
                <button id="pdfClear" class="btn btn-secondary">Limpiar</button>
              </div>
            </div>
          </div>
        </section>

        <!-- Debug -->
        <section id="panel-debug" class="panel chat-container hidden">
          <div id="debugFeed" class="chat-history">
            <p class="status-message">Herramientas de depuración</p>
          </div>
          <div class="chat-input-area flex flex-col gap-4">
            <!-- Play Tone -->
            <div class="flex gap-2">
              <input
                type="number"
                id="toneFreq"
                class="input-box w-24"
                placeholder="Hz"
                value="440"
              />
              <input
                type="number"
                id="toneDur"
                class="input-box w-24"
                placeholder="ms"
                value="500"
              />
              <button id="tonePlay" class="btn btn-primary">
                Reproducir Tono
              </button>
            </div>
            <!-- LED -->
            <div class="flex gap-2">
              <button id="ledTest" class="btn btn-secondary">Test LED</button>
            </div>
            <!-- Button State -->
            <div class="flex gap-2 items-center">
              <button id="btnState" class="btn btn-secondary">
                Leer Botón
              </button>
              <span id="btnResult" class="font-medium"></span>
            </div>
            <!-- Mic Record -->
            <div class="flex gap-2">
              <input
                type="number"
                id="micDur"
                class="input-box w-24"
                placeholder="seg"
                value="3"
              />
              <button id="micRec" class="btn btn-primary">Grabar Mic</button>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script>
      const socket = io("/realtime", { transports: ["websocket"] });
      const el = (sel) => document.querySelector(sel);
      const elAll = (sel) => document.querySelectorAll(sel);

      function showToast(message, type = "info") {
        console.log(`TOAST (${type}): ${message}`);
        const toast = document.createElement("div");
        toast.textContent = message;
        toast.className = `fixed bottom-5 right-5 p-3 rounded-lg shadow-md text-white ${
          type === "error"
            ? "bg-red-500"
            : type === "success"
            ? "bg-green-500"
            : "bg-blue-500"
        }`;
        document.body.appendChild(toast);
        setTimeout(() => {
          toast.remove();
        }, 3000);
      }

      const feedClear = (feedSel, statusSel = null, initialMsg = "") => {
        const feed = el(feedSel);
        if (!feed) return;
        feed.innerHTML = "";
        if (statusSel) {
          const statusElement = el(statusSel);
          if (statusElement) {
            if (feed.contains(statusElement)) {
              const p = document.createElement("p");
              p.id = statusElement.id;
              p.className = "status-message";
              p.textContent = initialMsg;
              feed.appendChild(p);
            } else {
              statusElement.textContent = initialMsg;
            }
          }
        }
      };

      function appendBubble(feedSel, text, who, audioUrl = null) {
        const feed = el(feedSel);
        if (!feed) return;
        const statusMsg = feed.querySelector(".status-message");
        if (
          statusMsg &&
          feed.children.length === 1 &&
          feed.firstChild === statusMsg
        ) {
          statusMsg.remove();
        }
        const bubbleDiv = document.createElement("div");
        bubbleDiv.className = `bubble ${who}`;
        const textNode = document.createElement("p");
        textNode.textContent = text;
        bubbleDiv.appendChild(textNode);
        if (audioUrl) {
          try {
            const audio = document.createElement("audio");
            audio.controls = true;
            audio.preload = "metadata";
            audio.src = audioUrl;
            audio.className = "mt-2 w-full";
            bubbleDiv.appendChild(audio);
          } catch {
            const errorP = document.createElement("p");
            errorP.className = "text-red-500 text-xs mt-1";
            errorP.textContent = "Could not load audio player.";
            bubbleDiv.appendChild(errorP);
          }
        }
        feed.appendChild(bubbleDiv);
        requestAnimationFrame(() => {
          feed.scrollTo({ top: feed.scrollHeight, behavior: "smooth" });
        });
      }

      async function apiCall(endpoint, method = "POST", body = null) {
        try {
          const options = { method, headers: {} };
          if (body) {
            if (body instanceof FormData) {
              options.body = body;
            } else {
              options.headers["Content-Type"] = "application/json";
              options.body = JSON.stringify(body);
            }
          }
          const response = await fetch(endpoint, options);
          let data;
          const contentType = response.headers.get("content-type");
          if (contentType && contentType.includes("application/json")) {
            data = await response.json();
          } else {
            const text = await response.text();
            data = {
              success: response.ok,
              error: text || `HTTP ${response.status}`,
            };
          }
          if (data.success === undefined) data.success = response.ok;
          if (!response.ok && !data.error)
            data.error = data.message || `HTTP ${response.status}`;
          return data;
        } catch (err) {
          console.error(`API call to ${endpoint} failed:`, err);
          return { success: false, error: err.message };
        }
      }

      /* Tabs */
      const tabs = elAll("#tabs .tab");
      const panels = elAll(".panel");
      tabs.forEach((tab) => {
        tab.onclick = () => {
          tabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          const target = `panel-${tab.dataset.tab}`;
          panels.forEach((p) => {
            p.id === target
              ? p.classList.remove("hidden")
              : p.classList.add("hidden");
          });
        };
      });

      /* TTS */
      const ttsInput = el("#ttsInput"),
        ttsSendBtn = el("#ttsSend"),
        ttsFeed = "#ttsFeed";
      ttsSendBtn.onclick = async () => {
        const txt = ttsInput.value.trim();
        if (!txt) return;
        appendBubble(ttsFeed, txt, "user");
        ttsInput.value = "";
        ttsInput.focus();
        ttsSendBtn.disabled = true;
        const res = await apiCall("/api/tts", "POST", { text: txt });
        if (res.success && res.message)
          appendBubble(ttsFeed, res.message, "bot", res.audio_url);
        else appendBubble(ttsFeed, `Error: ${res.error}`, "bot");
        ttsSendBtn.disabled = false;
      };
      el("#ttsClear").onclick = () => feedClear(ttsFeed);

      /* Agent */
      const agentInput = el("#agentInput"),
        agentSendBtn = el("#agentSend"),
        agentFeed = "#agentFeed";
      agentSendBtn.onclick = async () => {
        const q = agentInput.value.trim();
        if (!q) return;
        appendBubble(agentFeed, q, "user");
        agentInput.value = "";
        agentInput.focus();
        agentSendBtn.disabled = true;
        const res = await apiCall("/api/agent", "POST", { query: q });
        if (res.success && res.message)
          appendBubble(agentFeed, res.message, "bot", res.audio_url);
        else appendBubble(agentFeed, `Error: ${res.error}`, "bot");
        agentSendBtn.disabled = false;
      };
      el("#agentClear").onclick = () => feedClear(agentFeed);

      /* Realtime */
      const startBtn = el("#startTalking"),
        stopBtn = el("#stopTalking"),
        rtStatus = el("#realtimeStatus"),
        realtimeFeed = "#realtimeFeed",
        rtText = el("#realtimeText"),
        rtTextSend = el("#realtimeTextSend");
      startBtn.onclick = () => socket.emit("start_talking");
      stopBtn.onclick = () => socket.emit("stop_talking");
      el("#rtClear").onclick = () =>
        feedClear(realtimeFeed, "#realtimeStatus", "Ready");
      rtTextSend.onclick = () => {
        const m = rtText.value.trim();
        if (!m) return;
        appendBubble(realtimeFeed, m, "user");
        rtText.value = "";
        rtText.focus();
        socket.emit("send_text", { text: m });
      };
      socket.on("status", (d) => {
        rtStatus.textContent = d.message;
        if (d.message === "Recording…") {
          startBtn.disabled = true;
          stopBtn.disabled = false;
        } else if (d.message === "Ready" || d.message.startsWith("Error:")) {
          startBtn.disabled = false;
          stopBtn.disabled = true;
        } else {
          startBtn.disabled = true;
          stopBtn.disabled = true;
        }
      });
      socket.on("broadcast_text", (d) => {
        appendBubble(realtimeFeed, d.message, "bot");
        rtStatus.textContent = "Ready";
        startBtn.disabled = false;
        stopBtn.disabled = true;
      });
      socket.on("connect", () => {
        rtStatus.textContent = "Connected. Ready.";
        startBtn.disabled = false;
        stopBtn.disabled = true;
      });
      socket.on("disconnect", () => {
        rtStatus.textContent = "Disconnected. Please reload.";
        startBtn.disabled = true;
        stopBtn.disabled = true;
      });
      socket.on("connect_error", (err) => {
        rtStatus.textContent = `Connection Error: ${err.message}`;
        startBtn.disabled = true;
        stopBtn.disabled = true;
      });

      /* PDF */
      let currentPDF = null;
      const pdfFile = el("#pdfFile"),
        pdfAskBtn = el("#pdfAsk"),
        pdfQuestion = el("#pdfQuestion"),
        pdfClearBtn = el("#pdfClear"),
        pdfFeed = "#pdfFeed",
        pdfStatus = el("#pdfUploadStatus"),
        pdfQA = el("#pdfQA");
      pdfFile.onchange = async () => {
        const file = pdfFile.files[0];
        if (!file) return;
        pdfStatus.textContent = "⏳ Subiendo e indexando…";
        pdfQA.classList.add("hidden");
        pdfAskBtn.disabled = true;
        currentPDF = null;
        const fd = new FormData();
        fd.append("file", file);
        const res = await apiCall("/api/pdf/upload", "POST", fd);
        if (res.success && res.filename) {
          currentPDF = res.filename;
          const txt = `✅ PDF listo: ${currentPDF}`;
          pdfStatus.textContent = txt;
          pdfQA.classList.remove("hidden");
          pdfAskBtn.disabled = false;
          pdfQuestion.focus();
          feedClear(pdfFeed, "#pdfUploadStatus", txt);
        } else {
          pdfStatus.textContent = `⚠️ Error: ${res.error}`;
          pdfFile.value = "";
        }
      };
      pdfAskBtn.onclick = async () => {
        const q = pdfQuestion.value.trim();
        if (!q || !currentPDF) {
          showToast("Please enter question & ensure PDF is loaded.", "warning");
          return;
        }
        appendBubble(pdfFeed, q, "user");
        pdfQuestion.value = "";
        pdfQuestion.focus();
        pdfAskBtn.disabled = true;
        const res = await apiCall("/api/pdf/ask", "POST", {
          question: q,
          filename: currentPDF,
        });
        if (res.success && res.answer)
          appendBubble(pdfFeed, res.answer, "bot", res.audio_url);
        else appendBubble(pdfFeed, `Error: ${res.error}`, "bot");
        pdfAskBtn.disabled = false;
      };
      pdfClearBtn.onclick = () => {
        const txt = currentPDF
          ? `✅ PDF listo: ${currentPDF}`
          : "Elige un PDF para cargar…";
        feedClear(pdfFeed, "#pdfUploadStatus", txt);
      };

      /* Debug */
      const tonePlay = el("#tonePlay"),
        ledTest = el("#ledTest"),
        btnState = el("#btnState"),
        micRec = el("#micRec"),
        toneFreq = el("#toneFreq"),
        toneDur = el("#toneDur"),
        micDur = el("#micDur"),
        btnResult = el("#btnResult"),
        debugFeed = "#debugFeed";
      tonePlay.onclick = async () => {
        const f = +toneFreq.value,
          d = +toneDur.value;
        appendBubble(debugFeed, `Tono ${f}Hz ${d}ms…`, "user");
        const res = await apiCall("/api/debug/tone", "POST", {
          frequency: f,
          duration: d,
        });
        if (res.success && res.audio_url)
          appendBubble(debugFeed, "Reproducido", "bot", res.audio_url);
        else appendBubble(debugFeed, `Error: ${res.error}`, "bot");
      };
      ledTest.onclick = async () => {
        appendBubble(debugFeed, "Parpadeo LED…", "user");
        const res = await apiCall("/api/debug/led", "POST", {});
        if (res.success) appendBubble(debugFeed, res.message, "bot");
        else appendBubble(debugFeed, `Error: ${res.error}`, "bot");
      };
      btnState.onclick = async () => {
        appendBubble(debugFeed, "Leyendo botón…", "user");
        const res = await apiCall("/api/debug/button", "GET");
        if (res.success && typeof res.pressed === "boolean") {
          const txt = res.pressed ? "Pulsado" : "Libre";
          btnResult.textContent = txt;
          appendBubble(debugFeed, `Estado: ${res.pressed}`, "bot");
        } else appendBubble(debugFeed, `Error: ${res.error}`, "bot");
      };
      micRec.onclick = async () => {
        const d = +micDur.value;
        appendBubble(debugFeed, `Grabando ${d}s…`, "user");
        const res = await apiCall("/api/debug/mic", "POST", { duration: d });
        if (res.success && res.audio_url)
          appendBubble(debugFeed, "Grabación lista", "bot", res.audio_url);
        else appendBubble(debugFeed, `Error: ${res.error}`, "bot");
      };

      document.addEventListener("DOMContentLoaded", () => {
        el(`#panel-tts`).classList.remove("hidden");
      });
    </script>
  </body>
</html>
```
