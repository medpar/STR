<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STR Proyecto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.4/socket.io.js"></script>
    <style>
      /* Basic chat styling & Layout */
      .chat-container {
        display: flex;
        flex-direction: column;
        /* Height calculation: screen height minus approx header/tabs/padding */
        height: calc(100vh - 200px); /* START ADJUSTING THIS VALUE */
        max-height: 70vh; /* Absolute max height */
        min-height: 300px; /* Minimum sensible height */
      }
      .chat-history {
        flex-grow: 1; /* Takes available space */
        overflow-y: auto; /* Enables scrolling */
        padding: 1rem 1.5rem; /* More horizontal padding */
        display: flex;
        flex-direction: column;
        gap: 0.8rem; /* Space between bubbles */
        background-color: #f9fafb; /* Slightly off-white background for chat area */
      }
      .chat-input-area {
        padding: 1rem 1.5rem; /* Match history padding */
        border-top: 1px solid #e5e7eb; /* Separator line */
        background-color: #ffffff; /* White background for input */
        flex-shrink: 0; /* Prevent input area from shrinking */
      }
      .input-box {
        /* General style for text inputs/areas */
        padding: 0.6rem 1rem; /* Slightly reduced padding */
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        flex-grow: 1; /* Input takes available width */
        outline: none;
        transition: border-color 0.2s ease;
        resize: none; /* Disable textarea resizing handle */
      }
      .input-box:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 1px #2563eb;
      }
      .bubble {
        padding: 0.75rem 1rem;
        border-radius: 0.75rem; /* Slightly more rounded */
        max-width: 85%; /* Allow slightly wider bubbles */
        word-wrap: break-word; /* Prevent long words from overflowing */
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05); /* Subtle shadow */
        line-height: 1.5; /* Improve readability */
      }
      .user {
        background-color: #dbeafe; /* Lighter blue */
        color: #1e3a8a; /* Darker blue text */
        align-self: flex-end;
        border-bottom-right-radius: 0.25rem; /* Tail effect */
        margin-left: auto; /* Push to right */
      }
      .bot {
        background-color: #e5e7eb; /* Lighter gray */
        color: #1f2937;
        align-self: flex-start;
        border-bottom-left-radius: 0.25rem; /* Tail effect */
        margin-right: auto; /* Push to left */
      }
      /* Buttons */
      .btn {
        /* Base button style */
        padding: 0.5rem 1.1rem; /* Adjusted padding */
        border-radius: 0.375rem;
        font-weight: 500;
        white-space: nowrap; /* Prevent button text wrapping */
        transition: background-color 0.2s ease, box-shadow 0.2s ease;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .btn:focus {
        outline: none;
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); /* Focus ring */
      }
      .btn-primary {
        background-color: #2563eb; /* Tailwind blue-600 */
        color: white;
      }
      .btn-primary:hover {
        background-color: #1d4ed8; /* Darker blue */
      }
      .btn-primary:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
        opacity: 0.7;
      }
      .btn-secondary {
        background-color: #6b7280; /* Gray-500 */
        color: white;
      }
      .btn-secondary:hover {
        background-color: #4b5563; /* Darker gray */
      }
      .btn-secondary:disabled {
        background-color: #9ca3af;
        cursor: not-allowed;
        opacity: 0.7;
      }
      audio {
        width: 100%;
        margin-top: 0.75rem; /* More space above audio player */
        display: block; /* Ensure it takes full width */
        height: 40px; /* Standard height */
      }
      /* Tab styling */
      .tab {
        padding: 0.75rem 1.25rem; /* Slightly larger tabs */
        border-bottom: 3px solid transparent; /* Thicker underline */
        color: #4b5563; /* Default tab color (gray-600) */
        font-weight: 500;
        transition: all 0.2s ease;
        text-align: center;
      }
      .tab:hover {
        color: #1d4ed8; /* Darker blue on hover */
        background-color: #eff6ff; /* Light blue background on hover */
      }
      .tab.active {
        border-color: #2563eb; /* Blue underline for active */
        color: #1e40af; /* Darker blue text for active */
        font-weight: 600;
      }
      /* Hide scrollbar for cleaner look (optional) */
      .chat-history::-webkit-scrollbar {
        display: none;
      }
      .chat-history {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* Status message styling */
      .status-message {
        text-align: center;
        font-size: 0.875rem; /* text-sm */
        color: #6b7280; /* gray-500 */
        padding: 0.5rem 1rem;
        background-color: #f3f4f6; /* gray-100 */
        border-radius: 9999px; /* rounded-full */
        align-self: center; /* Center horizontally */
        margin: 0.5rem auto; /* Add some margin */
      }
      /* Bluetooth Switch Styling */
      .switch {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 24px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 24px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }
      input:checked + .slider {
        background-color: #2563eb;
      }
      input:checked + .slider:before {
        transform: translateX(26px);
      }
    </style>
  </head>
  <body class="bg-gray-100 text-gray-900 font-sans antialiased">
    <!-- Added antialiased -->
    <div
      class="max-w-4xl mx-auto py-6 px-4 sm:px-6 lg:px-8 flex flex-col gap-5"
    >
      <!-- Increased max-width slightly -->
      <!-- Title -->
      <h1 class="text-3xl font-bold text-center text-gray-800 tracking-tight">
        📡 Proyecto STR
      </h1>

      <!-- Tabs -->
      <nav class="flex justify-center border-b border-gray-300 pb-0" id="tabs">
        <button data-tab="tts" class="tab active">TTS</button>
        <button data-tab="agent" class="tab">Agent</button>
        <button data-tab="realtime" class="tab">Realtime</button>
        <button data-tab="pdf" class="tab">PDF</button>
        <button data-tab="bluetooth" class="tab">Bluetooth</button>
        <!-- New Tab -->
      </nav>

      <!-- Panels Container -->
      <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <!-- Increased shadow -->

        <!-- ------------ TTS ------------- -->
        <section id="panel-tts" class="panel chat-container">
          <div id="ttsFeed" class="chat-history"></div>
          <div
            class="chat-input-area flex flex-col sm:flex-row gap-3 items-center"
          >
            <textarea
              id="ttsInput"
              class="input-box"
              placeholder="Escribe texto…"
              rows="1"
            ></textarea>
            <!-- rows="1" for shorter initial height -->
            <div class="flex gap-2 flex-shrink-0">
              <button id="ttsSend" class="btn btn-primary">Enviar</button>
              <button id="ttsClear" class="btn btn-secondary">Limpiar</button>
            </div>
          </div>
        </section>

        <!-- ------------ Agent ----------- -->
        <section id="panel-agent" class="panel chat-container hidden">
          <div id="agentFeed" class="chat-history"></div>
          <div
            class="chat-input-area flex flex-col sm:flex-row gap-3 items-center"
          >
            <textarea
              id="agentInput"
              class="input-box"
              placeholder="Pregunta…"
              rows="1"
            ></textarea>
            <!-- rows="1" -->
            <div class="flex gap-2 flex-shrink-0">
              <button id="agentSend" class="btn btn-primary">Enviar</button>
              <button id="agentClear" class="btn btn-secondary">Limpiar</button>
            </div>
          </div>
        </section>

        <!-- -------- Realtime ------------ -->
        <section id="panel-realtime" class="panel chat-container hidden">
          <div id="realtimeFeed" class="chat-history">
            <p id="realtimeStatus" class="status-message">Initializing...</p>
          </div>
          <div class="chat-input-area flex flex-col gap-4">
            <div class="flex flex-wrap gap-3 justify-center">
              <button id="startTalking" class="btn btn-primary">
                🎙️ Start
              </button>
              <!-- Added nbsp -->
              <button id="stopTalking" class="btn btn-secondary" disabled>
                ⏹️ Stop
              </button>
              <button id="rtClear" class="btn btn-secondary">Limpiar</button>
            </div>
            <div class="flex gap-3 items-center">
              <input
                id="realtimeText"
                class="input-box"
                placeholder="Enviar texto al aire…"
              />
              <button
                id="realtimeTextSend"
                class="btn btn-primary flex-shrink-0"
              >
                Enviar
              </button>
            </div>
          </div>
        </section>

        <!-- ------------- PDF ------------ -->
        <section id="panel-pdf" class="panel chat-container hidden">
          <div id="pdfFeed" class="chat-history">
            <p id="pdfUploadStatus" class="status-message">
              Elige un PDF para cargar…
            </p>
          </div>
          <div class="chat-input-area flex flex-col gap-3">
            <input
              type="file"
              id="pdfFile"
              accept="application/pdf"
              class="block w-full text-sm text-gray-700 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer border border-gray-300 rounded-lg p-1"
            />
            <div
              id="pdfQA"
              class="hidden flex flex-col sm:flex-row gap-3 mt-2 items-center"
            >
              <input
                id="pdfQuestion"
                class="input-box flex-grow"
                placeholder="Pregunta sobre tu PDF…"
              />
              <div class="flex gap-2 flex-shrink-0">
                <button id="pdfAsk" class="btn btn-primary">Preguntar</button>
                <button id="pdfClear" class="btn btn-secondary">Limpiar</button>
              </div>
            </div>
          </div>
        </section>

        <!-- ---------- Bluetooth ----------- -->
        <section
          id="panel-bluetooth"
          class="panel hidden p-6 flex flex-col gap-4 items-center"
        >
          <h2 class="text-xl font-semibold text-gray-700">Control Bluetooth</h2>
          <div
            class="flex items-center gap-4 p-4 border border-gray-200 rounded-lg bg-gray-50 w-full max-w-md"
          >
            <span class="font-medium text-gray-600"
              >Enable Discoverability & Pairing:</span
            >
            <label class="switch">
              <input type="checkbox" id="btToggle" />
              <span class="slider"></span>
            </label>
          </div>
          <div
            id="bluetoothStatus"
            class="mt-4 text-sm text-gray-600 p-3 border border-gray-200 rounded-lg bg-gray-50 w-full max-w-md"
          >
            <p>
              <strong>Status:</strong>
              <span id="btStatusText">Fetching...</span>
            </p>
            <p><strong>Powered:</strong> <span id="btPowered">...</span></p>
            <p>
              <strong>Discoverable:</strong>
              <span id="btDiscoverable">...</span>
            </p>
            <p><strong>Pairable:</strong> <span id="btPairable">...</span></p>
            <p id="btError" class="text-red-600 mt-1"></p>
          </div>
          <button id="btRefreshStatus" class="btn btn-secondary mt-2">
            Refresh Status
          </button>
        </section>
      </div>
      <!-- End Card-like container -->
    </div>

    <script>
      const socket = io("/realtime", { transports: ["websocket"] }); // Force websocket if needed
      const el = (sel) => document.querySelector(sel);
      const elAll = (sel) => document.querySelectorAll(sel);

      // --- Helper Functions ---
      function showToast(message, type = "info") {
        // Basic toast notification (implement a library later if needed)
        console.log(`TOAST (${type}): ${message}`);
        // You could add a simple div temporarily appearing on screen here
      }

      const feedClear = (feedSel, statusSel = null, initialMsg = "") => {
        const feed = el(feedSel);
        if (!feed) return;
        feed.innerHTML = "";
        if (statusSel) {
          const statusElement = el(statusSel);
          if (statusElement) {
            // If status is inside the feed, re-create it
            if (feed.contains(statusElement)) {
              const p = document.createElement("p");
              p.id = statusElement.id; // Keep the ID
              p.className = "status-message"; // Use consistent class
              p.textContent = initialMsg;
              feed.appendChild(p);
            }
          }
        }
      };

      function appendBubble(feedSel, text, who, audioUrl = null) {
        const feed = el(feedSel);
        if (!feed) return;

        // Remove any initial status message placeholder inside the feed
        const statusMsg = feed.querySelector(".status-message");
        if (
          statusMsg &&
          feed.children.length === 1 &&
          feed.firstChild === statusMsg
        ) {
          statusMsg.remove();
        }

        const bubbleDiv = document.createElement("div");
        bubbleDiv.className = `bubble ${who}`;

        const textNode = document.createElement("p");
        textNode.textContent = text; // Use textContent for safety against XSS
        bubbleDiv.appendChild(textNode);

        if (audioUrl) {
          try {
            const audio = document.createElement("audio");
            audio.controls = true;
            // Preload metadata to potentially get duration faster, etc.
            audio.preload = "metadata";
            audio.src = audioUrl;
            audio.className = "mt-2 w-full"; // Add margin top
            bubbleDiv.appendChild(audio);
          } catch (e) {
            console.error("Error creating audio element:", e);
            const errorP = document.createElement("p");
            errorP.className = "text-red-500 text-xs mt-1";
            errorP.textContent = "Could not load audio player.";
            bubbleDiv.appendChild(errorP);
          }
        }
        feed.appendChild(bubbleDiv);

        // Scroll to the bottom smoothly
        // Use requestAnimationFrame for potentially smoother scroll on rapid updates
        requestAnimationFrame(() => {
          feed.scrollTo({ top: feed.scrollHeight, behavior: "smooth" });
        });
      }

      async function apiCall(endpoint, method = "POST", body = null) {
        try {
          const options = {
            method: method,
            headers: {},
          };
          if (body) {
            if (body instanceof FormData) {
              // Let browser set Content-Type for FormData
            } else {
              options.headers["Content-Type"] = "application/json";
              options.body = JSON.stringify(body);
            }
          }
          if (body && !(body instanceof FormData)) {
            options.body = JSON.stringify(body);
          } else if (body instanceof FormData) {
            options.body = body; // Assign FormData directly
          }

          const response = await fetch(endpoint, options);
          const data = await response.json(); // Assume JSON response

          if (!response.ok) {
            throw new Error(
              data.error || data.message || `HTTP error ${response.status}`
            );
          }
          return data; // Contains success: true/false and message/data
        } catch (error) {
          console.error(`API call to ${endpoint} failed:`, error);
          // Return an error structure consistent with expected JSON errors
          return { success: false, error: error.message };
        }
      }

      /* ---------- Tabs ---------- */
      const tabs = elAll("#tabs .tab");
      const panels = elAll(".panel");

      tabs.forEach((tab) => {
        tab.onclick = () => {
          tabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");

          const targetPanelId = `panel-${tab.dataset.tab}`;
          panels.forEach((p) => {
            if (p.id === targetPanelId) {
              p.classList.remove("hidden");
              // Scroll chat history to bottom when tab becomes active
              const history = p.querySelector(".chat-history");
              if (history) {
                requestAnimationFrame(() => {
                  history.scrollTop = history.scrollHeight;
                });
              }
              // Special action for Bluetooth tab
              if (tab.dataset.tab === "bluetooth") {
                refreshBluetoothStatus(); // Fetch status when tab is opened
              }
            } else {
              p.classList.add("hidden");
            }
          });
        };
      });

      /* ---------- TTS ---------- */
      const ttsInput = el("#ttsInput");
      const ttsSendBtn = el("#ttsSend");
      const ttsFeed = "#ttsFeed";

      ttsSendBtn.onclick = async () => {
        const txt = ttsInput.value.trim();
        if (!txt) return;
        appendBubble(ttsFeed, txt, "user");
        ttsInput.value = "";
        ttsInput.focus();
        ttsSendBtn.disabled = true; // Disable button during request

        const result = await apiCall("/api/tts", "POST", { text: txt });

        if (result && result.message) {
          // Check for message specifically
          appendBubble(ttsFeed, result.message, "bot", result.audio_url);
        } else {
          appendBubble(
            ttsFeed,
            `Error: ${result.error || "Unknown TTS error"}`,
            "bot"
          );
        }
        ttsSendBtn.disabled = false; // Re-enable button
      };
      el("#ttsClear").onclick = () => feedClear(ttsFeed);
      ttsInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          ttsSendBtn.click();
        }
      });

      /* ---------- Agent ---------- */
      const agentInput = el("#agentInput");
      const agentSendBtn = el("#agentSend");
      const agentFeed = "#agentFeed";

      agentSendBtn.onclick = async () => {
        const q = agentInput.value.trim();
        if (!q) return;
        appendBubble(agentFeed, q, "user");
        agentInput.value = "";
        agentInput.focus();
        agentSendBtn.disabled = true;

        const result = await apiCall("/api/agent", "POST", { query: q });

        if (result && result.message) {
          appendBubble(agentFeed, result.message, "bot", result.audio_url);
        } else {
          appendBubble(
            agentFeed,
            `Error: ${result.error || "Unknown Agent error"}`,
            "bot"
          );
        }
        agentSendBtn.disabled = false;
      };
      el("#agentClear").onclick = () => feedClear(agentFeed);
      agentInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          agentSendBtn.click();
        }
      });

      /* ---------- Realtime ---------- */
      const rtStatusEl = el("#realtimeStatus");
      const startBtn = el("#startTalking");
      const stopBtn = el("#stopTalking");
      const rtTextInput = el("#realtimeText");
      const rtTextSendBtn = el("#realtimeTextSend");
      const realtimeFeed = "#realtimeFeed";

      startBtn.onclick = () => socket.emit("start_talking");
      stopBtn.onclick = () => socket.emit("stop_talking");
      el("#rtClear").onclick = () =>
        feedClear(realtimeFeed, "#realtimeStatus", "Ready");

      rtTextSendBtn.onclick = () => {
        const m = rtTextInput.value.trim();
        if (!m) return;
        appendBubble(realtimeFeed, m, "user");
        rtTextInput.value = "";
        rtTextInput.focus();
        socket.emit("send_text", { text: m });
      };
      rtTextInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          rtTextSendBtn.click();
        }
      });

      socket.on("status", (d) => {
        if (rtStatusEl) rtStatusEl.textContent = d.message;
        // Enable/disable buttons based on status
        if (d.message === "Recording…") {
          startBtn.disabled = true;
          stopBtn.disabled = false;
        } else if (d.message === "Ready" || d.message.startsWith("Error:")) {
          startBtn.disabled = false;
          stopBtn.disabled = true;
        } else {
          // Processing, Connecting, etc.
          startBtn.disabled = true;
          stopBtn.disabled = true;
        }
      });
      socket.on("broadcast_text", (d) => {
        appendBubble(realtimeFeed, d.message, "bot");
        // Assume bot speaking means interaction is done, ready for next input
        if (rtStatusEl) rtStatusEl.textContent = "Ready";
        startBtn.disabled = false;
        stopBtn.disabled = true;
      });
      socket.on("connect", () => {
        console.log("Realtime Socket Connected");
        if (rtStatusEl) rtStatusEl.textContent = "Connected. Ready.";
        startBtn.disabled = false;
        stopBtn.disabled = true;
      });
      socket.on("disconnect", () => {
        console.log("Realtime Socket Disconnected");
        if (rtStatusEl) rtStatusEl.textContent = "Disconnected. Please reload.";
        startBtn.disabled = true;
        stopBtn.disabled = true;
      });
      socket.on("connect_error", (err) => {
        console.error("Realtime Socket Connection Error:", err);
        if (rtStatusEl)
          rtStatusEl.textContent = `Connection Error: ${err.message}`;
        startBtn.disabled = true;
        stopBtn.disabled = true;
      });

      /* ---------- PDF ---------- */
      let currentPDF = null; // Store filename of the currently active PDF
      const pdfStatusEl = el("#pdfUploadStatus");
      const pdfQASection = el("#pdfQA");
      const pdfFileInput = el("#pdfFile");
      const pdfQuestionInput = el("#pdfQuestion");
      const pdfAskBtn = el("#pdfAsk");
      const pdfFeed = "#pdfFeed";

      pdfFileInput.onchange = async () => {
        const file = pdfFileInput.files[0];
        if (!file) return;

        pdfStatusEl.textContent = "⏳ Subiendo e indexando… por favor espera";
        pdfStatusEl.classList.remove("hidden");
        pdfQASection.classList.add("hidden");
        pdfAskBtn.disabled = true; // Disable ask while uploading
        currentPDF = null; // Reset current PDF

        const formData = new FormData();
        formData.append("file", file);

        // Use apiCall helper for consistency
        const result = await apiCall("/api/pdf/upload", "POST", formData);

        if (result && result.filename) {
          // Check for filename specifically
          currentPDF = result.filename;
          pdfStatusEl.textContent = `✅ PDF listo: ${currentPDF}`;
          pdfQASection.classList.remove("hidden");
          pdfAskBtn.disabled = false; // Enable ask button
          pdfQuestionInput.focus();
          // Clear previous chat history for the new PDF
          feedClear(pdfFeed, "#pdfUploadStatus", `✅ PDF listo: ${currentPDF}`);
        } else {
          pdfStatusEl.textContent = `⚠️ Error: ${
            result.error || "Upload failed"
          }`;
          pdfFileInput.value = ""; // Clear file input on error
        }
      };

      pdfAskBtn.onclick = async () => {
        const q = pdfQuestionInput.value.trim();
        if (!q || !currentPDF) {
          showToast(
            "Please enter a question and make sure a PDF is uploaded.",
            "warning"
          );
          return;
        }
        appendBubble(pdfFeed, q, "user");
        pdfQuestionInput.value = "";
        pdfQuestionInput.focus();
        pdfAskBtn.disabled = true; // Disable during request

        const result = await apiCall("/api/pdf/ask", "POST", {
          question: q,
          filename: currentPDF, // Send the current filename
        });

        if (result && result.answer) {
          appendBubble(pdfFeed, result.answer, "bot", result.audio_url);
        } else {
          appendBubble(
            pdfFeed,
            `Error: ${result.error || "Could not get answer"}`,
            "bot"
          );
        }
        pdfAskBtn.disabled = false; // Re-enable button
      };
      pdfQuestionInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          pdfAskBtn.click();
        }
      });

      el("#pdfClear").onclick = () => {
        // Clear feed but keep the status of the currently loaded PDF
        const statusText = currentPDF
          ? `✅ PDF listo: ${currentPDF}`
          : "Elige un PDF para cargar…";
        feedClear(pdfFeed, "#pdfUploadStatus", statusText);
      };

      /* ---------- Bluetooth ---------- */
      const btToggle = el("#btToggle");
      const btStatusText = el("#btStatusText");
      const btPowered = el("#btPowered");
      const btDiscoverable = el("#btDiscoverable");
      const btPairable = el("#btPairable");
      const btError = el("#btError");
      const btRefreshBtn = el("#btRefreshStatus");

      async function refreshBluetoothStatus() {
        btStatusText.textContent = "Fetching...";
        btPowered.textContent = "...";
        btDiscoverable.textContent = "...";
        btPairable.textContent = "...";
        btError.textContent = "";
        btToggle.disabled = true; // Disable toggle while fetching
        btRefreshBtn.disabled = true;

        const result = await apiCall("/api/bluetooth/status", "GET");

        if (result && result.error === null) {
          // Check if error is explicitly null or undefined
          btStatusText.textContent = "OK";
          btPowered.textContent = result.powered ? "Yes" : "No";
          btDiscoverable.textContent = result.discoverable ? "Yes" : "No";
          btPairable.textContent = result.pairable ? "Yes" : "No";
          // Update the toggle state based on discoverable AND pairable status
          // Consider them enabled only if both are true
          btToggle.checked = result.discoverable && result.pairable;
          btToggle.disabled = false; // Re-enable toggle
        } else {
          btStatusText.textContent = "Error";
          const errorMsg = result.error || "Failed to fetch status";
          btError.textContent = errorMsg;
          console.error("Bluetooth status error:", errorMsg);
          btToggle.disabled = true; // Keep disabled on error
          showToast(`Bluetooth Status Error: ${errorMsg}`, "error");
        }
        btRefreshBtn.disabled = false; // Re-enable refresh button
      }

      btToggle.onchange = async () => {
        const enable = btToggle.checked;
        btToggle.disabled = true; // Disable during API call
        btStatusText.textContent = enable ? "Enabling..." : "Disabling...";

        // Call both discoverable and pairable endpoints
        const payload = { enable: enable };
        const discoverableResult = await apiCall(
          "/api/bluetooth/discoverable",
          "POST",
          payload
        );
        const pairableResult = await apiCall(
          "/api/bluetooth/pairable",
          "POST",
          payload
        );

        // Check results and update status/UI
        if (discoverableResult.success && pairableResult.success) {
          showToast(
            `Bluetooth ${enable ? "enabled" : "disabled"} successfully`,
            "success"
          );
          // Refresh status after a short delay to allow system changes
          setTimeout(refreshBluetoothStatus, 1500);
        } else {
          const errMsg = `Discoverable: ${
            discoverableResult.message || discoverableResult.error
          }. Pairable: ${pairableResult.message || pairableResult.error}`;
          showToast(`Bluetooth update failed: ${errMsg}`, "error");
          btError.textContent = `Update failed: ${errMsg}`;
          // Revert toggle state on failure and refresh status immediately
          btToggle.checked = !enable; // Revert UI
          refreshBluetoothStatus(); // Get actual current state
        }
        // Re-enable is handled by refreshBluetoothStatus
      };

      btRefreshBtn.onclick = refreshBluetoothStatus;

      // --- Initial Setup ---
      document.addEventListener("DOMContentLoaded", () => {
        console.log("DOM Content Loaded");
        // Set initial state for Realtime on load
        if (rtStatusEl) rtStatusEl.textContent = "Connecting...";
        startBtn.disabled = true; // Disable until socket connects
        stopBtn.disabled = true;

        // Set initial state for PDF
        pdfQASection.classList.add("hidden");
        pdfAskBtn.disabled = true;

        // Initial Bluetooth status check (optional, might do it on tab click)
        // refreshBluetoothStatus(); // Or call this when BT tab is first clicked
      });
    </script>
  </body>
</html>
